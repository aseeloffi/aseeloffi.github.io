<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>قارئ الكتب</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    :root {
      --bg:        #141414;
      --bg2:       #0d0d0d;
      --surface:   #1e1e1e;
      --surface2:  #272727;
      --text:      #ddd8ce;
      --muted:     #6b6560;
      --accent:    #b07d4a;
      --accent2:   rgba(176,125,74,0.18);
      --border:    #2a2a2a;
      --page-shadow: 0 4px 32px rgba(0,0,0,0.6);
    }
    body.light {
      --bg:       #f0ebe3;
      --bg2:      #e8e2d9;
      --surface:  #faf7f2;
      --surface2: #ede8df;
      --text:     #1a1710;
      --muted:    #8a8070;
      --accent:   #8a5c28;
      --accent2:  rgba(138,92,40,0.12);
      --border:   #d8d0c4;
      --page-shadow: 0 4px 24px rgba(0,0,0,0.18);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%; width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Tajawal', sans-serif;
      overflow: hidden;
      transition: background 0.3s, color 0.3s;
    }

    /* ── UPLOAD SCREEN ── */
    #uploadScreen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 28px; z-index: 500;
      background: var(--bg);
      transition: opacity 0.4s;
    }
    #uploadScreen.hidden { opacity: 0; pointer-events: none; }

    .upload-logo {
      font-size: 3.2rem;
      line-height: 1;
    }
    .upload-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.02em;
    }
    .upload-sub {
      font-size: 0.88rem;
      color: var(--muted);
      text-align: center;
      max-width: 280px;
      line-height: 1.6;
    }
    .drop-zone {
      width: 300px;
      border: 2px dashed var(--border);
      border-radius: 18px;
      padding: 36px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--accent);
      background: var(--accent2);
    }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .drop-icon { font-size: 2.4rem; margin-bottom: 10px; }
    .drop-text { font-size: 0.9rem; color: var(--muted); }
    .drop-text span { color: var(--accent); font-weight: 600; }

    .recent-label {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    #recentList {
      display: flex; flex-direction: column; gap: 8px;
      width: 300px; max-height: 160px; overflow-y: auto;
    }
    .recent-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      font-size: 0.85rem;
      color: var(--text);
      text-align: right;
    }
    .recent-item:hover { background: var(--surface2); border-color: var(--accent); }
    .recent-item-icon { font-size: 1.1rem; flex-shrink: 0; }
    .recent-item-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .recent-item-pg { font-size: 0.72rem; color: var(--muted); flex-shrink: 0; }

    /* ── LOADING ── */
    #loadingScreen {
      position: fixed; inset: 0; z-index: 400;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    #loadingScreen.show { opacity: 1; pointer-events: all; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loadingText { font-size: 0.9rem; color: var(--muted); }
    #loadingProgress {
      width: 200px; height: 3px;
      background: var(--border); border-radius: 2px; overflow: hidden;
    }
    #loadingBar {
      height: 100%; width: 0%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.2s;
    }

    /* ── READER ── */
    #readerScreen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s;
    }
    #readerScreen.show { opacity: 1; pointer-events: all; }

    /* Header */
    #header {
      height: 52px; flex-shrink: 0;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 14px; gap: 10px;
      z-index: 100;
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      will-change: transform;
    }
    #header.hide { transform: translateY(-100%); }

    .hbtn {
      background: none; border: none;
      color: var(--muted); font-size: 1.1rem;
      cursor: pointer; padding: 6px 8px;
      border-radius: 8px;
      transition: background 0.15s, color 0.15s;
      line-height: 1;
    }
    .hbtn:hover { background: var(--surface2); color: var(--text); }

    #bookTitle {
      flex: 1;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      text-align: center;
    }
    #pageInfo {
      font-size: 0.78rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    /* Canvas area */
    #canvasContainer {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 12px;
      gap: 16px;
      scroll-behavior: auto;
    }
    #canvasContainer::-webkit-scrollbar { width: 5px; }
    #canvasContainer::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .page-wrapper {
      position: relative;
      flex-shrink: 0;
      box-shadow: var(--page-shadow);
      border-radius: 4px;
      overflow: hidden;
      background: #fff;
    }
    .page-wrapper canvas { display: block; }

    /* ── CONTROLS PANEL ── */
    #controls {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      background: rgba(14,14,14,0.88);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 50px;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: opacity 0.3s, transform 0.3s;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
    body.light #controls {
      background: rgba(245,240,232,0.9);
      border-color: rgba(0,0,0,0.12);
    }
    #controls.hidden { opacity: 0; pointer-events: none; transform: translateX(-50%) translateY(12px); }

    .cbtn {
      background: none; border: none;
      color: var(--muted); font-size: 1.1rem;
      cursor: pointer; padding: 5px 8px;
      border-radius: 50%; width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .cbtn:hover { background: var(--surface2); color: var(--text); }
    .cbtn.active { color: var(--accent); }

    #scrollToggle { font-size: 1.2rem; }

    .speed-group {
      display: flex; align-items: center; gap: 6px;
    }
    .speed-group .cbtn { font-size: 0.9rem; width: 28px; height: 28px; }

    #speedSlider {
      -webkit-appearance: none;
      appearance: none;
      width: 80px; height: 4px;
      border-radius: 2px;
      background: var(--border);
      outline: none; cursor: pointer;
    }
    #speedSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }
    #speedBadge {
      font-size: 0.72rem;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      min-width: 26px;
    }

    .ctrl-divider {
      width: 1px; height: 22px;
      background: var(--border); flex-shrink: 0;
    }

    /* Seek bar */
    #seekBar {
      -webkit-appearance: none;
      appearance: none;
      width: 90px; height: 4px;
      border-radius: 2px;
      background: var(--border);
      outline: none; cursor: pointer;
    }
    #seekBar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 0.82rem;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Thumbnail sidebar */
    #thumbSidebar {
      position: fixed;
      top: 0; right: 0;
      width: 130px; height: 100%;
      background: var(--bg2);
      border-left: 1px solid var(--border);
      z-index: 300;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #thumbSidebar.open { transform: translateX(0); }
    #thumbSidebar::-webkit-scrollbar { width: 3px; }
    #thumbSidebar::-webkit-scrollbar-thumb { background: var(--border); }

    .thumb-item {
      cursor: pointer;
      border: 2px solid transparent;
      border-radius: 6px;
      overflow: hidden;
      transition: border-color 0.15s;
      position: relative;
    }
    .thumb-item:hover { border-color: var(--accent); }
    .thumb-item.active { border-color: var(--accent); }
    .thumb-item canvas { width: 100% !important; height: auto !important; display: block; }
    .thumb-pg {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.55);
      color: #fff; font-size: 0.65rem;
      text-align: center; padding: 2px;
    }

    #thumbOverlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 299;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    #thumbOverlay.show { opacity: 1; pointer-events: all; }

    @media (max-width: 480px) {
      #speedSlider { width: 60px; }
      #seekBar { width: 60px; }
      #controls { padding: 6px 10px; gap: 6px; }
    }
  </style>

</head>
<body>

<!-- UPLOAD SCREEN -->

<div id="uploadScreen">
  <div class="upload-logo">📖</div>
  <div class="upload-title">قارئ الكتب</div>
  <div class="upload-sub">افتح أي كتاب PDF مع سكرول تلقائي</div>

  <div class="drop-zone" id="dropZone">
    <input type="file" accept=".pdf" id="fileInput">
    <div class="drop-icon">📂</div>
    <div class="drop-text">اسحب ملف PDF هنا<br>أو <span>اضغط للاختيار</span></div>
  </div>

  <div id="recentSection" style="display:none; flex-direction:column; align-items:center; gap:10px;">
    <div class="recent-label">آخر الكتب</div>
    <div id="recentList"></div>
  </div>
</div>

<!-- LOADING -->

<div id="loadingScreen">
  <div class="spinner"></div>
  <div id="loadingText">جاري تحميل الكتاب…</div>
  <div id="loadingProgress"><div id="loadingBar"></div></div>
</div>

<!-- READER -->

<div id="readerScreen">
  <div id="header">
    <button class="hbtn" id="closeBtn" title="إغلاق">✕</button>
    <div id="bookTitle">—</div>
    <div id="pageInfo">—</div>
    <button class="hbtn" id="themeBtn" title="تبديل الوضع">🌙</button>
    <button class="hbtn" id="thumbBtn" title="الصفحات">⊞</button>
  </div>

  <div id="canvasContainer"></div>

  <div id="controls">
    <button class="cbtn" id="scrollToggle" title="تشغيل السكرول">▶</button>
    <div class="ctrl-divider"></div>
    <div class="speed-group">
      <button class="cbtn" id="minusBtn">−</button>
      <input type="range" id="speedSlider" min="0.2" max="3" step="0.1" value="0.8">
      <button class="cbtn" id="plusBtn">+</button>
      <span id="speedBadge">×0.8</span>
    </div>
    <div class="ctrl-divider"></div>
    <input type="range" id="seekBar" min="0" max="1000" value="0" title="موضع القراءة">
  </div>
</div>

<!-- THUMBNAILS -->

<div id="thumbOverlay"></div>
<div id="thumbSidebar" id="thumbSidebar"></div>

<!-- TOAST -->

<div id="toast"></div>

<script>
// PDF.js worker
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── STATE ──
let pdfDoc = null;
let totalPages = 0;
let pageCanvases = []; // rendered canvas per page
let thumbCanvases = [];
let currentPage = 1;
let bookName = '';

let isScrolling = false;
let rafId = null;
let lastTime = null;
let scrollAccum = 0;
let scrollWhole = 0;
let isPaused = false;
let isTouching = false;
let resumeTimer = null;

const SCALE = window.devicePixelRatio >= 2 ? 2.5 : 2;
const THUMB_SCALE = 0.25;

// ── ELEMENTS ──
const uploadScreen   = document.getElementById('uploadScreen');
const loadingScreen  = document.getElementById('loadingScreen');
const readerScreen   = document.getElementById('readerScreen');
const loadingBar     = document.getElementById('loadingBar');
const loadingText    = document.getElementById('loadingText');
const canvasContainer= document.getElementById('canvasContainer');
const header         = document.getElementById('header');
const bookTitle      = document.getElementById('bookTitle');
const pageInfo       = document.getElementById('pageInfo');
const scrollToggle   = document.getElementById('scrollToggle');
const speedSlider    = document.getElementById('speedSlider');
const speedBadge     = document.getElementById('speedBadge');
const seekBar        = document.getElementById('seekBar');
const minusBtn       = document.getElementById('minusBtn');
const plusBtn        = document.getElementById('plusBtn');
const closeBtn       = document.getElementById('closeBtn');
const themeBtn       = document.getElementById('themeBtn');
const thumbBtn       = document.getElementById('thumbBtn');
const thumbSidebar   = document.getElementById('thumbSidebar');
const thumbOverlay   = document.getElementById('thumbOverlay');
const dropZone       = document.getElementById('dropZone');
const fileInput      = document.getElementById('fileInput');
const controls       = document.getElementById('controls');
const toast          = document.getElementById('toast');

// ── TOAST ──
let toastTimer;
function showToast(msg, dur = 1800) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), dur);
}

// ── THEME ──
function toggleTheme() {
  document.body.classList.toggle('light');
  themeBtn.textContent = document.body.classList.contains('light') ? '☀️' : '🌙';
  localStorage.setItem('readerTheme', document.body.classList.contains('light') ? 'light' : 'dark');
}
themeBtn.addEventListener('click', toggleTheme);
if (localStorage.getItem('readerTheme') === 'light') {
  document.body.classList.add('light');
  themeBtn.textContent = '☀️';
}

// ── RECENT BOOKS (metadata only, no file) ──
function getRecent() {
  try { return JSON.parse(localStorage.getItem('readerRecent') || '[]'); } catch { return []; }
}
function saveRecent(name, page) {
  let list = getRecent().filter(r => r.name !== name);
  list.unshift({ name, page });
  list = list.slice(0, 6);
  localStorage.setItem('readerRecent', JSON.stringify(list));
}
function updateRecentPage(name, page) {
  let list = getRecent();
  const idx = list.findIndex(r => r.name === name);
  if (idx >= 0) { list[idx].page = page; localStorage.setItem('readerRecent', JSON.stringify(list)); }
}
function renderRecentList() {
  const list = getRecent();
  const sec = document.getElementById('recentSection');
  const ul  = document.getElementById('recentList');
  ul.innerHTML = '';
  if (!list.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'flex';
  list.forEach(r => {
    const el = document.createElement('div');
    el.className = 'recent-item';
    el.innerHTML = `<span class="recent-item-icon">📄</span>
      <span class="recent-item-name">${r.name}</span>
      <span class="recent-item-pg">ص ${r.page}</span>`;
    el.title = 'افتح الملف من جهازك';
    el.addEventListener('click', () => {
      showToast('اختر الملف من جهازك لاستكمال القراءة');
      fileInput.click();
    });
    ul.appendChild(el);
  });
}
renderRecentList();

// ── FILE INPUT ──
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type === 'application/pdf') loadPDF(file);
  else showToast('يرجى اختيار ملف PDF فقط');
});
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) loadPDF(fileInput.files[0]);
});

// ── LOAD PDF ──
async function loadPDF(file) {
  bookName = file.name.replace(/\.pdf$/i, '');
  bookTitle.textContent = bookName;

  uploadScreen.classList.add('hidden');
  loadingScreen.classList.add('show');
  loadingBar.style.width = '0%';
  loadingText.textContent = 'جاري تحميل الكتاب…';

  const arrayBuffer = await file.arrayBuffer();
  const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });

  loadingTask.onProgress = (p) => {
    if (p.total) loadingBar.style.width = Math.round((p.loaded / p.total) * 50) + '%';
  };

  pdfDoc = await loadingTask.promise;
  totalPages = pdfDoc.numPages;

  canvasContainer.innerHTML = '';
  thumbSidebar.innerHTML = '';
  pageCanvases = [];
  thumbCanvases = [];

  // Restore progress
  let startPage = 1;
  try {
    const saved = JSON.parse(localStorage.getItem('readerProgress_' + bookName));
    if (saved && saved.page) startPage = saved.page;
  } catch {}

  // Render all pages
  loadingText.textContent = 'جاري تقديم الصفحات…';
  for (let i = 1; i <= totalPages; i++) {
    loadingBar.style.width = (50 + Math.round((i / totalPages) * 50)) + '%';
    await renderPage(i);
  }

  saveRecent(bookName, startPage);

  // Scroll to saved page
  setTimeout(() => {
    scrollToPage(startPage, false);
    scrollAccum = canvasContainer.scrollTop;
    scrollWhole = Math.floor(scrollAccum);

    loadingScreen.classList.remove('show');
    readerScreen.classList.add('show');
    updateSpeedSlider();
    updateSeekBar();
    schedulePageDetect();
  }, 200);
}

async function renderPage(num) {
  const page = await pdfDoc.getPage(num);

  // Main canvas
  const viewport = page.getViewport({ scale: SCALE });
  const wrapper = document.createElement('div');
  wrapper.className = 'page-wrapper';
  wrapper.dataset.page = num;

  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  canvas.style.width  = (viewport.width  / SCALE) + 'px';
  canvas.style.height = (viewport.height / SCALE) + 'px';

  await page.render({ canvasContext: ctx, viewport }).promise;
  wrapper.appendChild(canvas);
  canvasContainer.appendChild(wrapper);
  pageCanvases.push(wrapper);

  // Thumbnail
  const tvp = page.getViewport({ scale: THUMB_SCALE });
  const tw = document.createElement('div');
  tw.className = 'thumb-item';
  tw.dataset.page = num;
  const tc = document.createElement('canvas');
  const tctx = tc.getContext('2d');
  tc.width = tvp.width; tc.height = tvp.height;
  await page.render({ canvasContext: tctx, viewport: tvp }).promise;
  const tpg = document.createElement('div');
  tpg.className = 'thumb-pg';
  tpg.textContent = num;
  tw.appendChild(tc); tw.appendChild(tpg);
  tw.addEventListener('click', () => {
    scrollToPage(num, true);
    closeThumbs();
  });
  thumbSidebar.appendChild(tw);
  thumbCanvases.push(tw);
}

function scrollToPage(num, animated) {
  const wrapper = pageCanvases[num - 1];
  if (!wrapper) return;
  const top = wrapper.offsetTop - canvasContainer.offsetTop - 20;
  if (animated) canvasContainer.scrollTo({ top, behavior: 'smooth' });
  else canvasContainer.scrollTop = top;
  scrollAccum = canvasContainer.scrollTop;
}

// ── PAGE DETECTION ──
let detectRAF = null;
function schedulePageDetect() {
  if (detectRAF) cancelAnimationFrame(detectRAF);
  detectRAF = requestAnimationFrame(detectCurrentPage);
}
function detectCurrentPage() {
  detectRAF = null;
  const mid = canvasContainer.scrollTop + canvasContainer.clientHeight / 2;
  let best = 1, bestDist = Infinity;
  pageCanvases.forEach((w, i) => {
    const wTop = w.offsetTop - canvasContainer.offsetTop;
    const wMid = wTop + w.offsetHeight / 2;
    const d = Math.abs(wMid - mid);
    if (d < bestDist) { bestDist = d; best = i + 1; }
  });
  if (best !== currentPage) {
    currentPage = best;
    pageInfo.textContent = `${currentPage} / ${totalPages}`;
    thumbCanvases.forEach((t, i) => t.classList.toggle('active', i + 1 === currentPage));
    updateRecentPage(bookName, currentPage);
    saveProgressLocal();
  }
  updateSeekBar();
}

function saveProgressLocal() {
  try {
    localStorage.setItem('readerProgress_' + bookName, JSON.stringify({ page: currentPage }));
  } catch {}
}

// ── SEEK BAR ──
function updateSeekBar() {
  const maxS = canvasContainer.scrollHeight - canvasContainer.clientHeight;
  if (!maxS) return;
  seekBar.value = Math.round((canvasContainer.scrollTop / maxS) * 1000);
}
let isSeeking = false;
seekBar.addEventListener('mousedown', () => isSeeking = true);
seekBar.addEventListener('touchstart', () => isSeeking = true, { passive: true });
seekBar.addEventListener('input', () => {
  const maxS = canvasContainer.scrollHeight - canvasContainer.clientHeight;
  const y = (parseInt(seekBar.value) / 1000) * maxS;
  canvasContainer.scrollTop = y;
  scrollAccum = y;
  schedulePageDetect();
});
seekBar.addEventListener('mouseup', () => { isSeeking = false; });
seekBar.addEventListener('touchend', () => { isSeeking = false; }, { passive: true });

// ── AUTO-SCROLL ENGINE ──
function getSpeed() { return parseFloat(speedSlider.value) * 30; } // px/s

function tick(ts) {
  if (!lastTime) { lastTime = ts; rafId = requestAnimationFrame(tick); return; }
  const dt = (ts - lastTime) / 1000;
  lastTime = ts;

  const delta = getSpeed() * dt;
  scrollAccum += delta;
  const newWhole = Math.floor(scrollAccum);
  const diff = newWhole - scrollWhole;
  if (diff > 0) {
    canvasContainer.scrollTop += diff;
    scrollWhole = newWhole;
  }

  const maxS = canvasContainer.scrollHeight - canvasContainer.clientHeight;
  if (canvasContainer.scrollTop >= maxS) {
    stopScroll();
    showToast('انتهى الكتاب');
    return;
  }

  if (!isSeeking) schedulePageDetect();
  rafId = requestAnimationFrame(tick);
}

function startScroll() {
  isScrolling = true; isPaused = false;
  scrollToggle.textContent = '⏸';
  scrollToggle.classList.add('active');
  scrollAccum = canvasContainer.scrollTop;
  scrollWhole = Math.floor(scrollAccum);
  lastTime = null;
  rafId = requestAnimationFrame(tick);
  showToast('السكرول شغّال');
}
function stopScroll() {
  isScrolling = false; isPaused = false;
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  scrollToggle.textContent = '▶';
  scrollToggle.classList.remove('active');
}
function pauseScroll() {
  if (!isScrolling || isPaused) return;
  isPaused = true;
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  lastTime = null;
  scheduleResume();
}
function scheduleResume() {
  clearTimeout(resumeTimer);
  if (isTouching) return;
  resumeTimer = setTimeout(() => {
    if (!isPaused) return;
    isPaused = false;
    scrollAccum = canvasContainer.scrollTop;
    scrollWhole = Math.floor(scrollAccum);
    lastTime = null;
    rafId = requestAnimationFrame(tick);
  }, 1000);
}

scrollToggle.addEventListener('click', e => {
  e.stopPropagation();
  isScrolling ? stopScroll() : startScroll();
});

// ── SPEED ──
function updateSpeedSlider() {
  const v = parseFloat(speedSlider.value);
  const pct = ((v - +speedSlider.min) / (+speedSlider.max - +speedSlider.min)) * 100;
  speedSlider.style.background =
    `linear-gradient(to left, rgba(176,125,74,0.85) ${pct}%, var(--track, #2a2a2a) ${pct}%)`;
  speedBadge.textContent = `×${v.toFixed(1)}`;
}
speedSlider.addEventListener('input', updateSpeedSlider);
plusBtn.addEventListener('click', e => {
  e.stopPropagation();
  speedSlider.value = Math.min(parseFloat(speedSlider.value) + 0.1, +speedSlider.max).toFixed(1);
  updateSpeedSlider();
});
minusBtn.addEventListener('click', e => {
  e.stopPropagation();
  speedSlider.value = Math.max(parseFloat(speedSlider.value) - 0.1, +speedSlider.min).toFixed(1);
  updateSpeedSlider();
});

// ── TOUCH / WHEEL PAUSE ──
let touchStartY = 0;
canvasContainer.addEventListener('wheel', () => { if (isScrolling) pauseScroll(); }, { passive: true });
canvasContainer.addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY;
  if (isScrolling && isPaused) { isTouching = true; clearTimeout(resumeTimer); }
}, { passive: true });
canvasContainer.addEventListener('touchmove', e => {
  if (Math.abs(e.touches[0].clientY - touchStartY) > 8 && isScrolling) {
    isTouching = true; clearTimeout(resumeTimer); pauseScroll();
  }
}, { passive: true });
canvasContainer.addEventListener('touchend', () => {
  if (isTouching) { isTouching = false; if (isPaused) scheduleResume(); }
}, { passive: true });
canvasContainer.addEventListener('scroll', () => {
  if (!isScrolling) schedulePageDetect();
  if (!isSeeking) updateSeekBar();
}, { passive: true });

// ── HEADER HIDE ON SCROLL ──
let lastScrollY = 0;
canvasContainer.addEventListener('scroll', () => {
  const y = canvasContainer.scrollTop;
  header.classList.toggle('hide', y > lastScrollY + 10 && y > 80);
  if (y < lastScrollY) header.classList.remove('hide');
  lastScrollY = y;
}, { passive: true });

// ── CONTROLS TOGGLE ──
document.body.addEventListener('click', e => {
  if (controls.contains(e.target) || thumbSidebar.contains(e.target) ||
      header.contains(e.target)) return;
  controls.classList.toggle('hidden');
});

// ── THUMBNAILS ──
function openThumbs() {
  thumbSidebar.classList.add('open');
  thumbOverlay.classList.add('show');
  // scroll thumbnail to current
  const active = thumbSidebar.querySelector('.thumb-item.active');
  if (active) active.scrollIntoView({ block: 'center' });
}
function closeThumbs() {
  thumbSidebar.classList.remove('open');
  thumbOverlay.classList.remove('show');
}
thumbBtn.addEventListener('click', () => thumbSidebar.classList.contains('open') ? closeThumbs() : openThumbs());
thumbOverlay.addEventListener('click', closeThumbs);

// ── CLOSE ──
closeBtn.addEventListener('click', () => {
  stopScroll();
  readerScreen.classList.remove('show');
  uploadScreen.classList.remove('hidden');
  renderRecentList();
  canvasContainer.innerHTML = '';
  thumbSidebar.innerHTML = '';
  pageCanvases = []; thumbCanvases = [];
  pdfDoc = null;
});

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  switch (e.code) {
    case 'Space': e.preventDefault(); isScrolling ? stopScroll() : startScroll(); break;
    case 'ArrowUp': case 'ArrowLeft':
      e.preventDefault();
      speedSlider.value = Math.max(parseFloat(speedSlider.value) - 0.1, +speedSlider.min).toFixed(1);
      updateSpeedSlider();
      showToast('السرعة: ×' + parseFloat(speedSlider.value).toFixed(1));
      break;
    case 'ArrowDown': case 'ArrowRight':
      e.preventDefault();
      speedSlider.value = Math.min(parseFloat(speedSlider.value) + 0.1, +speedSlider.max).toFixed(1);
      updateSpeedSlider();
      showToast('السرعة: ×' + parseFloat(speedSlider.value).toFixed(1));
      break;
    case 'Escape': closeThumbs(); break;
  }
});

window.addEventListener('beforeunload', saveProgressLocal);
</script>

</body>
