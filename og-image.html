<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #111;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    color: #e8e8e8;
    position: relative;
  }

/* Subtle texture overlay */
body::before {
content: ‘’;
position: absolute;
inset: 0;
background:
radial-gradient(ellipse 60% 70% at 30% 40%, rgba(200,169,110,0.07) 0%, transparent 70%),
radial-gradient(ellipse 50% 60% at 80% 60%, rgba(76,175,125,0.04) 0%, transparent 60%);
}

.border-frame {
position: absolute;
inset: 24px;
border: 1px solid rgba(200,169,110,0.25);
pointer-events: none;
}
.border-frame::before {
content: ‘’;
position: absolute;
inset: 6px;
border: 1px solid rgba(200,169,110,0.1);
}

/* Corner ornaments */
.corner {
position: absolute;
width: 36px;
height: 36px;
}
.corner svg { width: 100%; height: 100%; }
.tl { top: 20px; left: 20px; }
.tr { top: 20px; right: 20px; transform: scaleX(-1); }
.bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
.br { bottom: 20px; right: 20px; transform: scale(-1); }

.layout {
position: absolute;
inset: 0;
display: flex;
align-items: center;
justify-content: space-between;
padding: 60px 90px;
direction: rtl;
}

/* Right: text content */
.text-side {
flex: 1;
display: flex;
flex-direction: column;
gap: 20px;
padding-left: 60px;
}

.top-badge {
display: inline-flex;
align-items: center;
gap: 8px;
background: rgba(200,169,110,0.1);
border: 1px solid rgba(200,169,110,0.3);
border-radius: 20px;
padding: 6px 16px;
width: fit-content;
color: #c8a96e;
font-size: 15px;
letter-spacing: 1px;
}
.dot {
width: 6px; height: 6px;
border-radius: 50%;
background: #4caf7d;
animation: none;
}

.main-title {
font-size: 78px;
font-weight: 700;
color: #c8a96e;
line-height: 1.1;
letter-spacing: 2px;
text-shadow: 0 0 40px rgba(200,169,110,0.3);
}

.subtitle {
font-size: 22px;
color: rgba(232,232,232,0.5);
font-weight: 400;
letter-spacing: 0.5px;
line-height: 1.6;
max-width: 420px;
}

.divider {
width: 80px;
height: 1px;
background: linear-gradient(to left, #c8a96e, transparent);
}

.features {
display: flex;
flex-direction: column;
gap: 10px;
margin-top: 4px;
}
.feat {
display: flex;
align-items: center;
gap: 10px;
font-size: 17px;
color: rgba(232,232,232,0.65);
}
.feat-dot {
width: 5px; height: 5px;
border-radius: 50%;
background: #c8a96e;
opacity: 0.7;
}

/* Left: book illustration */
.book-side {
width: 280px;
flex-shrink: 0;
display: flex;
align-items: center;
justify-content: center;
position: relative;
}

.glow-ring {
position: absolute;
width: 260px;
height: 260px;
border-radius: 50%;
background: radial-gradient(circle, rgba(200,169,110,0.12) 0%, transparent 70%);
}

/* Horizontal divider */
.h-divider {
position: absolute;
left: 0; right: 0;
bottom: 140px;
height: 1px;
background: linear-gradient(to right, transparent, rgba(200,169,110,0.15), transparent);
}

</style>
</head>
