<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#252525"/>
      <stop offset="100%" stop-color="#111111"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8a96e" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c8a96e" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->

  <rect width="512" height="512" rx="110" fill="url(#bgGrad)"/>

  <!-- Subtle radial glow center -->

  <ellipse cx="256" cy="230" rx="200" ry="180" fill="url(#glowGrad)"/>

  <!-- Outer decorative ring (thin) -->

  <circle cx="256" cy="256" r="200" fill="none" stroke="#c8a96e" stroke-width="1.2" stroke-opacity="0.2"/>
  <circle cx="256" cy="256" r="192" fill="none" stroke="#c8a96e" stroke-width="0.6" stroke-opacity="0.12"/>

  <!-- Arabic text بسم الله الرحمن الرحيم — top inscription area -->

  <!-- Decorative line above text -->

  <line x1="130" y1="148" x2="382" y2="148" stroke="#c8a96e" stroke-width="0.8" stroke-opacity="0.4"/>

  <!-- Main Quran symbol — open book shape -->

  <g transform="translate(256,270)">
    <!-- Left page -->
    <path d="M-110,-80 C-110,-90 -100,-95 -85,-95 L-8,-95 L-8,85 L-85,85 C-100,85 -110,80 -110,70 Z"
      fill="none" stroke="#c8a96e" stroke-width="2.5" stroke-opacity="0.85"/>
    <!-- Right page -->
    <path d="M110,-80 C110,-90 100,-95 85,-95 L8,-95 L8,85 L85,85 C100,85 110,80 110,70 Z"
      fill="none" stroke="#c8a96e" stroke-width="2.5" stroke-opacity="0.85"/>
    <!-- Spine -->
    <line x1="0" y1="-100" x2="0" y2="90" stroke="#c8a96e" stroke-width="2" stroke-opacity="0.6"/>
    <!-- Page lines left -->
    <line x1="-90" y1="-55" x2="-18" y2="-55" stroke="#c8a96e" stroke-width="1" stroke-opacity="0.35"/>
    <line x1="-90" y1="-33" x2="-18" y2="-33" stroke="#c8a96e" stroke-width="1" stroke-opacity="0.35"/>
    <line x1="-90" y1="-11" x2="-18" y2="-11" stroke="#c8a96e" stroke-width="1" stroke-opacity="0.35"/>
    <line x1="-90" y1="11" x2="-18" y2="11" stroke="#c8a96e" stroke-width="1" stroke-opacity="0.35"/>
    <line x1="-90" y1="33" x2="-18" y2="33" stroke="#c8a96e" stroke-width="1" stroke-opacity="0.35"/>
    <line x1="-90" y1="55" x2="-18" y2="55" stroke="#c8a96e" stroke-width="1" stroke-opacity="0.35"/>
    <!-- Page lines right -->
    <line x1="90" y1="-55" x2="18" y2="-55" stroke="#c8a96e" stroke-width="1" stroke-opacity="0.35"/>
    <line x1="90" y1="-33" x2="18" y2="-33" stroke="#c8a96e" stroke-width="1" stroke-opacity="0.35"/>
    <line x1="90" y1="-11" x2="18" y2="-11" stroke="#c8a96e" stroke-width="1" stroke-opacity="0.35"/>
    <line x1="90" y1="11" x2="18" y2="11" stroke="#c8a96e" stroke-width="1" stroke-opacity="0.35"/>
    <line x1="90" y1="33" x2="18" y2="33" stroke="#c8a96e" stroke-width="1" stroke-opacity="0.35"/>
    <line x1="90" y1="55" x2="18" y2="55" stroke="#c8a96e" stroke-width="1" stroke-opacity="0.35"/>
  </g>

  <!-- Decorative line below text area -->

  <line x1="130" y1="400" x2="382" y2="400" stroke="#c8a96e" stroke-width="0.8" stroke-opacity="0.4"/>

  <!-- Corner ornaments -->

  <!-- Top-left -->

  <g transform="translate(60,60)" opacity="0.4">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#c8a96e" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="0" y2="30" stroke="#c8a96e" stroke-width="1.5"/>
  </g>
  <!-- Top-right -->
  <g transform="translate(452,60)" opacity="0.4">
    <line x1="0" y1="0" x2="-30" y2="0" stroke="#c8a96e" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="0" y2="30" stroke="#c8a96e" stroke-width="1.5"/>
  </g>
  <!-- Bottom-left -->
  <g transform="translate(60,452)" opacity="0.4">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#c8a96e" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="0" y2="-30" stroke="#c8a96e" stroke-width="1.5"/>
  </g>
  <!-- Bottom-right -->
  <g transform="translate(452,452)" opacity="0.4">
    <line x1="0" y1="0" x2="-30" y2="0" stroke="#c8a96e" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="0" y2="-30" stroke="#c8a96e" stroke-width="1.5"/>
  </g>
</svg>
