<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>القرآن الكريم</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preload" href="https://cdn.jsdelivr.net/gh/thetruetruth/quran-data-kfgqpc@main/hafs/font/hafs.18.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    @font-face {
      font-family: 'Conv_original-hafs';
      src: url('https://cdn.jsdelivr.net/gh/thetruetruth/quran-data-kfgqpc@main/hafs/font/hafs.18.woff2') format('woff2'),
           url('https://cdn.jsdelivr.net/gh/thetruetruth/quran-data-kfgqpc@main/hafs/font/hafs.18.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #1a1a1a;
      --bg2: #111;
      --text: #e8e8e8;
      --gold: #c8a96e;
      --gold2: rgba(200,169,110,0.6);
      --green: #4caf7d;
      --muted: #888;
      --border: #333;
      --panel-bg: rgba(255,255,255,0.04);
      --panel-border: rgba(255,255,255,0.09);
      --track: rgba(255,255,255,0.07);
      --highlight-bg: rgba(200,169,110,0.12);
      --highlight-border: rgba(200,169,110,0.4);
      --sidebar-bg: #0e0e0e;
      --sidebar-item-hover: rgba(255,255,255,0.05);
      --sidebar-item-active: rgba(200,169,110,0.12);
      --header-h: 70px;
    }

    body.light {
      --bg: #f5f0e8;
      --bg2: #ede7d9;
      --text: #1a1a1a;
      --gold: #8a6a2e;
      --gold2: rgba(138,106,46,0.5);
      --green: #2d7a52;
      --muted: #666;
      --border: #d0c8b8;
      --panel-bg: rgba(0,0,0,0.04);
      --panel-border: rgba(0,0,0,0.1);
      --track: rgba(0,0,0,0.08);
      --highlight-bg: rgba(138,106,46,0.1);
      --highlight-border: rgba(138,106,46,0.35);
      --sidebar-bg: #ede7d9;
      --sidebar-item-hover: rgba(0,0,0,0.04);
      --sidebar-item-active: rgba(138,106,46,0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      overflow: hidden;
      height: 100%;
      width: 100%;
      background-color: var(--bg);
      color: var(--text);
      direction: rtl;
      transition: background-color 0.3s, color 0.3s;
    }

    /* ====== SIDEBAR ====== */
    #sidebar {
      position: fixed;
      top: 0; right: 0;
      width: 280px;
      height: 100%;
      background: var(--sidebar-bg);
      border-left: 1px solid var(--border);
      z-index: 2000;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
      will-change: transform;
    }
    #sidebar.open { transform: translateX(0); }

    .sidebar-header {
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-header h2 {
      font-family: 'Tajawal', sans-serif;
      font-size: 1.1em;
      color: var(--gold);
      font-weight: 700;
    }
    .sidebar-close {
      background: none; border: none;
      color: var(--muted); font-size: 1.3em;
      cursor: pointer; padding: 4px 8px;
      border-radius: 8px;
      transition: background 0.2s, color 0.2s;
    }
    .sidebar-close:hover { background: var(--sidebar-item-hover); color: var(--text); }

    .sidebar-search {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-search input {
      width: 100%;
      background: var(--track);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 10px;
      border-radius: 10px;
      font-family: system-ui, sans-serif;
      font-size: 0.82em;
      outline: none;
      direction: rtl;
      transition: border-color 0.2s;
    }
    .sidebar-search input:focus { border-color: var(--gold); }
    .sidebar-search input::placeholder { color: var(--muted); }

    #surahList {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }
    #surahList::-webkit-scrollbar { width: 4px; }
    #surahList::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .surah-item {
      display: flex;
      align-items: center;
      padding: 11px 14px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: background 0.15s;
      gap: 10px;
    }
    body.light .surah-item { border-bottom: 1px solid rgba(0,0,0,0.04); }
    .surah-item:hover { background: var(--sidebar-item-hover); }
    .surah-item.active { background: var(--sidebar-item-active); }
    .surah-num {
      font-size: 0.7em;
      color: var(--muted);
      min-width: 24px;
      font-family: system-ui, sans-serif;
      font-variant-numeric: tabular-nums;
    }
    .surah-name {
      font-family: 'Tajawal', sans-serif;
      font-size: 1em;
      font-weight: 500;
      color: var(--text);
      flex: 1;
    }
    .surah-count {
      font-size: 0.65em;
      color: var(--muted);
      font-family: system-ui, sans-serif;
    }

    #sidebarOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s;
    }
    #sidebarOverlay.visible { opacity: 1; pointer-events: all; }

    /* ====== HEADER — hides/shows on scroll ====== */
    .page-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background-color: var(--bg2);
      padding: 14px 20px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      transition: background-color 0.3s, transform 0.3s cubic-bezier(0.4,0,0.2,1);
      will-change: transform;
    }
    .page-header.hidden-header {
      transform: translateY(-100%);
    }
    .header-center { flex: 1; }
    .page-header h1 {
      font-family: 'Tajawal', sans-serif;
      font-size: 1.2em;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.01em;
    }
    .header-meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 4px;
    }
    .header-meta span {
      color: var(--muted);
      font-size: 0.72em;
      font-family: 'Tajawal', sans-serif;
    }
    .ayah-indicator {
      color: var(--gold) !important;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .header-btns {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .hbtn {
      background: var(--track);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 34px; height: 34px;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9em;
      transition: background 0.2s, color 0.2s;
      flex-shrink: 0;
    }
    .hbtn:hover { background: var(--sidebar-item-hover); color: var(--text); }
    .hbtn.active { background: var(--sidebar-item-active); color: var(--gold); border-color: var(--gold2); }

    .font-controls {
      display: flex;
      gap: 4px;
    }
    .font-btn {
      background: var(--track);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 9px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8em;
      font-family: system-ui, sans-serif;
      transition: background 0.2s, color 0.2s;
    }
    .font-btn:hover { background: var(--sidebar-item-hover); color: var(--text); }
    .font-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .basmalah {
      text-align: center;
      padding: 28px 20px 8px;
      font-family: Conv_original-hafs, serif;
      font-size: 2.2em;
      color: var(--text);
      line-height: 1.8em;
    }

    .quran-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 10px 25px 40px;
    }

    #quranText {
      font-size: 2em;
      text-align: justify;
      font-family: Conv_original-hafs, serif;
      color: var(--text);
      font-weight: 400;
      line-height: 1.85em;
    }

    b { font-weight: 400; color: var(--gold); }

    /* ── Ayah number — clickable, no transition color change ── */
    label {
      font-family: Conv_original-hafs, serif;
      color: var(--green);
      font-size: 0.75em;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      border-radius: 50%;
      padding: 0 2px;
      transition: background 0.15s;
    }
    label:hover {
      background: var(--highlight-bg);
    }
    label:active {
      background: rgba(200,169,110,0.25);
    }
    /* Bookmarked ayah number highlight */
    label.bm-active {
      background: rgba(200,169,110,0.28);
      color: var(--gold);
      box-shadow: 0 0 0 2px var(--gold2);
      border-radius: 50%;
      font-weight: 700;
    }

    .p5 {
      text-align: center;
      color: var(--muted);
      font-size: 0.5em;
      margin-top: 30px;
      font-family: sans-serif;
    }

    /* ====== SURAH NAV (bottom) ====== */
    .surah-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 25px;
      gap: 12px;
      max-width: 900px;
      margin: 0 auto;
      margin-bottom: 200px;
    }
    .surah-nav-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      color: var(--text);
      padding: 10px 18px;
      border-radius: 50px;
      cursor: pointer;
      font-family: Conv_original-hafs, serif;
      font-size: 0.85em;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .surah-nav-btn:hover {
      background: var(--sidebar-item-active);
      border-color: var(--gold2);
      color: var(--gold);
    }
    .surah-nav-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      pointer-events: none;
    }
    .surah-nav-btn .nav-arrow {
      font-size: 1em;
      color: var(--gold);
    }

    /* ====== MAIN VIEWPORT ====== */
    #viewport {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow: hidden;
    }

    /* ✅ Native-feeling scroll container */
    #scrollContainer {
      position: absolute;
      inset: 0;
      overflow-y: scroll;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: auto;
      overscroll-behavior: contain;
      will-change: scroll-position;
    }
    /* hide scrollbar but keep functional */
    #scrollContainer::-webkit-scrollbar { width: 0; }

    #scroller {
      contain: layout style;
      min-height: 100%;
      transform: translateZ(0);
    }

    /* ====== SCROLL PANEL ====== */
    .scroll-panel {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--panel-bg);
      backdrop-filter: blur(20px) saturate(1.8) brightness(1.1);
      -webkit-backdrop-filter: blur(20px) saturate(1.8) brightness(1.1);
      border: 1px solid var(--panel-border);
      border-radius: 22px;
      padding: 13px 18px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      z-index: 1000;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35), 0 2px 8px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.08);
      font-family: system-ui, -apple-system, sans-serif;
      width: 88%;
      max-width: 340px;
      transition: opacity 0.3s ease, transform 0.3s ease;
      contain: layout style;
    }

    .scroll-panel.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(10px);
    }

    .progress-section { width: 100%; display: flex; flex-direction: column; gap: 5px; }
    .progress-labels { display: flex; justify-content: space-between; align-items: center; }
    .progress-label { font-size: 0.65em; color: rgba(128,128,128,0.6); letter-spacing: 0.03em; }
    .progress-pct { font-size: 0.65em; font-weight: 700; color: var(--gold); font-variant-numeric: tabular-nums; }

    .seek-bar {
      -webkit-appearance: none;
      width: 100%; height: 5px; border-radius: 4px;
      outline: none; cursor: pointer;
      background: var(--track);
    }
    .seek-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 15px; height: 15px; border-radius: 50%;
      background: #fff;
      border: 2px solid rgba(200,169,110,0.9);
      cursor: pointer;
      box-shadow: 0 1px 6px rgba(0,0,0,0.5);
      transition: transform 0.15s;
    }
    .seek-bar:active::-webkit-slider-thumb { transform: scale(1.25); }

    .divider { width: 100%; height: 1px; background: rgba(128,128,128,0.1); }

    .main-controls {
      display: flex; align-items: center;
      justify-content: center; gap: 10px; width: 100%;
    }

    .step-btn {
      background: var(--track);
      border: 1px solid var(--panel-border);
      color: rgba(128,128,128,0.6);
      width: 32px; height: 32px; border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.05em;
      transition: background 0.2s, color 0.2s, opacity 0.2s;
      flex-shrink: 0;
    }
    .step-btn:hover:not(:disabled) { background: rgba(200,169,110,0.14); color: var(--gold); }
    .step-btn:disabled { opacity: 0.25; cursor: not-allowed; pointer-events: none; }

    /* Jump buttons */
    .jump-btn {
      background: var(--track);
      border: 1px solid var(--panel-border);
      color: rgba(128,128,128,0.7);
      height: 28px;
      padding: 0 10px;
      border-radius: 20px;
      cursor: pointer;
      display: flex; align-items: center; gap: 4px;
      font-size: 0.65em;
      font-family: system-ui, sans-serif;
      white-space: nowrap;
      transition: background 0.2s, color 0.2s;
      flex-shrink: 0;
    }
    .jump-btn:hover { background: rgba(200,169,110,0.14); color: var(--gold); }
    .jump-btn svg { width: 12px; height: 12px; flex-shrink: 0; }

    .scroll-btn {
      background: rgba(200,169,110,0.9);
      color: #111;
      border: none;
      width: 46px; height: 46px; border-radius: 50%;
      cursor: pointer;
      font-size: 1.1em;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 14px rgba(200,169,110,0.3), inset 0 1px 0 rgba(255,255,255,0.25);
      transition: transform 0.15s, background 0.2s;
      flex-shrink: 0;
    }
    .scroll-btn:active { transform: scale(0.92); }
    .scroll-btn.active { background: rgba(255,255,255,0.88); }

    .play-icon, .pause-icon {
      width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .play-icon svg, .pause-icon svg {
      width: 20px; height: 20px;
      display: block;
    }
    .pause-icon { display: none; }
    .scroll-btn.active .play-icon  { display: none; }
    .scroll-btn.active .pause-icon { display: flex; }

    .speed-section { width: 100%; display: flex; align-items: center; gap: 8px; }
    .speed-label { font-size: 0.62em; color: rgba(128,128,128,0.45); flex-shrink: 0; letter-spacing: 0.02em; }

    .speed-slider {
      -webkit-appearance: none;
      flex: 1; height: 3px; border-radius: 2px;
      outline: none; cursor: pointer;
      background: var(--track);
    }
    .speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 11px; height: 11px; border-radius: 50%;
      background: rgba(200,169,110,0.9);
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
      transition: transform 0.15s;
    }
    .speed-slider:active::-webkit-slider-thumb { transform: scale(1.4); }

    .speed-badge {
      font-size: 0.62em; font-weight: 700;
      color: rgba(200,169,110,0.8);
      font-variant-numeric: tabular-nums;
      min-width: 30px; text-align: left; flex-shrink: 0;
    }

    .time-remaining { font-size: 0.62em; color: rgba(128,128,128,0.4); font-variant-numeric: tabular-nums; }

    /* ====== BOOKMARK BUTTON ====== */
    #bookmarkBtn { position: relative; }
    #bookmarkBtn svg { width: 16px; height: 16px; }
    #bookmarkBtn .bm-dot {
      position: absolute;
      top: 4px; left: 4px;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--gold);
      display: none;
    }
    #bookmarkBtn.has-bookmark .bm-dot { display: block; }
    #bookmarkBtn.has-bookmark svg { fill: var(--gold); color: var(--gold); }

    /* ====== THEME BUTTON ====== */
    #themeBtn svg { width: 16px; height: 16px; }

    /* ====== BOOKMARK PANEL ====== */
    #bookmarkPanel {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      background: var(--sidebar-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 16px;
      z-index: 1500;
      width: 88%;
      max-width: 300px;
      font-family: 'Tajawal', sans-serif;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
    }
    #bookmarkPanel.show {
      opacity: 1;
      pointer-events: all;
      transform: translateX(-50%) translateY(0);
    }
    .bm-panel-title {
      color: var(--gold);
      margin-bottom: 8px;
      font-family: 'Tajawal', sans-serif;
      font-size: 0.9em;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .bm-panel-title svg { width: 14px; height: 14px; }
    .bm-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 200px;
      overflow-y: auto;
    }
    .bm-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
      background: var(--track);
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .bm-item:hover { background: var(--sidebar-item-hover); }
    .bm-item-text {
      font-size: 0.82em;
      color: var(--text);
      font-family: 'Tajawal', sans-serif;
      font-weight: 500;
    }
    .bm-item-del {
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      font-size: 0.8em;
      padding: 2px 5px;
      border-radius: 6px;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .bm-item-del:hover { color: #e55; }
    .bm-add-btn {
      width: 100%;
      margin-top: 8px;
      background: var(--sidebar-item-active);
      border: 1px solid var(--gold2);
      color: var(--gold);
      padding: 7px;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Tajawal', sans-serif;
      font-size: 0.9em;
      font-weight: 500;
      transition: background 0.2s;
    }
    .bm-add-btn:hover { background: rgba(200,169,110,0.18); }
    .bm-empty {
      font-size: 0.8em;
      color: var(--muted);
      text-align: center;
      padding: 8px 0;
      font-family: 'Tajawal', sans-serif;
    }

    /* ====== OFFLINE BADGE ====== */
    #offlineBadge {
      position: fixed;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(200,169,110,0.85);
      color: #111;
      font-size: 0.7em;
      padding: 4px 12px;
      border-radius: 20px;
      font-family: system-ui, sans-serif;
      z-index: 5000;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }
    #offlineBadge.show { opacity: 1; }

    /* ====== TOAST ====== */
    #toast {
      position: fixed;
      bottom: 110px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(30,30,30,0.92);
      color: #e8e8e8;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.78em;
      font-family: system-ui, sans-serif;
      z-index: 3000;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }
    body.light #toast { background: rgba(240,235,225,0.95); color: #1a1a1a; border: 1px solid var(--border); }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ====== LOADING ====== */
    #loadingScreen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      transition: opacity 0.4s;
    }
    #loadingScreen.hidden { opacity: 0; pointer-events: none; display: none; }

// ====== ICON TEMPLATES ======
const ICON_MOON = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.5 14.7A8.5 8.5 0 0 1 9.3 3.5a.6.6 0 0 0-.77-.78A10 10 0 1 0 21.27 15.5a.6.6 0 0 0-.77-.8z"/></svg>';

// ====== STATE ======
const BASE_SPEED = 40;
let isScrolling = false;
let rafId = null;
let lastTime = null;
let scrollAccum = 0; // floating-point scroll position accumulator (fixes sub-pixel stall at low speeds)
let scrollWhole = 0; // last integer px written to scrollTop (avoids redundant DOM writes)
let isSeeking = false;
let uiRafId = null;
let uiDirty = false;
let currentSurah = 2;
let fontSize = parseFloat(localStorage.getItem('fontSize') || '2');
const FONT_MIN = 1.2, FONT_MAX = 3.5;
let ayahPositions = [];
let currentAyah = 1;
let ayahUpdateScheduled = false;
let pendingAyah = null;

// ====== HEADER HIDE/SHOW on scroll ======
let lastScrollY = 0;
let headerVisible = true;
let headerRafId = null;

function updateHeader(scrollY) {
  const delta = scrollY - lastScrollY;
  lastScrollY = scrollY;
  if (scrollY < 60) {
    // Always show near top
    if (!headerVisible) {
      headerVisible = true;
      pageHeader.classList.remove('hidden-header');
    }
    return;
  }
  if (delta > 4 && headerVisible) {
    headerVisible = false;
    pageHeader.classList.add('hidden-header');
  } else if (delta < -4 && !headerVisible) {
    headerVisible = true;
    pageHeader.classList.remove('hidden-header');
  }
}

scrollContainer.addEventListener('scroll', () => {
  const sy = scrollContainer.scrollTop;
  if (!headerRafId) {
    headerRafId = requestAnimationFrame(() => {
      headerRafId = null;
      if (!isScrolling) updateHeader(sy);
      scheduleUI();
    });
  }
}, { passive: true });

// ====== TOAST ======
let toastTimer = null;
function showToast(msg, duration = 2000) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), duration);
}

// ====== THEME ======
function applyTheme(light) {
  document.body.classList.toggle('light', light);
  themeBtn.innerHTML = light ? ICON_SUN : ICON_MOON;
  localStorage.setItem('theme', light ? 'light' : 'dark');
}
const savedTheme = localStorage.getItem('theme');
applyTheme(savedTheme === 'light');
themeBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  applyTheme(!document.body.classList.contains('light'));
});

// ====== FONT SIZE ======
function applyFontSize(size) {
  fontSize = Math.max(FONT_MIN, Math.min(FONT_MAX, size));
  quranText.style.fontSize = fontSize + 'em';
  localStorage.setItem('fontSize', fontSize);
  fontMinus.disabled = fontSize <= FONT_MIN;
  fontPlus.disabled  = fontSize >= FONT_MAX;
  scheduleUI();
}
applyFontSize(fontSize);
fontPlus.addEventListener('click',  (e) => { e.stopPropagation(); applyFontSize(fontSize + 0.15); });
fontMinus.addEventListener('click', (e) => { e.stopPropagation(); applyFontSize(fontSize - 0.15); });

// ====== SPEED BUTTONS ======
function updateSpeedBtnStates() {
  const val = parseFloat(speedSlider.value);
  minusBtn.disabled = val <= parseFloat(speedSlider.min) + 0.001;
  plusBtn.disabled  = val >= parseFloat(speedSlider.max) - 0.001;
}

// ====== SIDEBAR ======
function buildSurahList(filter = '') {
  surahList.innerHTML = '';
  const filtered = SURAHS.filter(s => s.name.includes(filter) || String(s.n).includes(filter));
  filtered.forEach(s => {
    const div = document.createElement('div');
    div.className = 'surah-item' + (s.n === currentSurah ? ' active' : '');
    div.innerHTML = `<span class="surah-num">${s.n}</span><span class="surah-name">سورة ${s.name}</span><span class="surah-count">${s.ayat} آية</span>`;
    div.addEventListener('click', () => { loadSurah(s.n); closeSidebar(); });
    surahList.appendChild(div);
  });
}
function openSidebar() {
  sidebar.classList.add('open');
  sidebarOverlay.classList.add('visible');
  buildSurahList();

  if (active) active.scrollIntoView({ block: 'center' });

  sidebarOverlay.classList.remove('visible');

sidebarClose.addEventListener('click', closeSidebar);
sidebarOverlay.addEventListener('click', closeSidebar);

// ====== HELPER ======
function toArabicNum(n) {
  return String(n).replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
}

// ====== AYAH TRACKING ======
function buildAyahPositions() {
  ayahPositions = [];
  const labels = quranText.querySelectorAll('label');
  labels.forEach(label => {
    const match = label.textContent.trim().match(/\d+/);
    if (match) {
      ayahPositions.push({ el: label.closest('span[data-ayah]') || label, num: parseInt(match[0]) });
    }
  });
}

// ① Ayah number tap → save bookmark (no transition color change)
function attachAyahTapHandlers() {
  quranText.querySelectorAll('label').forEach(label => {
    label.addEventListener('click', (e) => {
      e.stopPropagation();
      const match = label.textContent.trim().match(/\d+/);
      if (!match) return;
      const ayahNum = parseInt(match[0]);
      addBookmarkForAyah(ayahNum);
    });
  });
}

function addBookmarkForAyah(ayahNum) {
  let bms = loadBookmarks();
  // Check if a bookmark for this ayah already exists in this surah
  const exists = bms.find(b => b.surah === currentSurah && b.ayah === ayahNum);
  if (exists) {
    showToast('هذه الآية محفوظة مسبقاً');
    highlightBookmarkedAyah(ayahNum);
    return;
  }
  const scrollY = scrollContainer.scrollTop;
  bms.push({ id: Date.now(), surah: currentSurah, ayah: ayahNum, posY: Math.round(scrollY) });
  // Keep max 5 bookmarks — remove oldest if exceeded
  if (bms.length > 5) {
    bms.shift();
    showToast('تمت إضافة العلامة وحُذفت الأقدم (الحد الأقصى ٥)');
  } else {
    showToast('تمت إضافة العلامة المرجعية ✓');
  }
  saveBookmarks(bms);
  updateBookmarkDot();
  refreshBookmarkHighlight();
}

function highlightBookmarkedAyah(ayahNum) {
  // Refresh all highlights based on current bookmarks
  refreshBookmarkHighlight();
}

function refreshBookmarkHighlight() {
  quranText.querySelectorAll('label.bm-active').forEach(l => l.classList.remove('bm-active'));
  const bms = loadBookmarks();
  const forThis = bms.filter(b => b.surah === currentSurah);
  if (!forThis.length) return;
  const bookmarkedAyahs = new Set(forThis.map(b => b.ayah));
  quranText.querySelectorAll('label').forEach(label => {
    const match = label.textContent.trim().match(/\d+/);
    if (match && bookmarkedAyahs.has(parseInt(match[0]))) {
      label.classList.add('bm-active');
    }
  });
}

function updateAyahIndicator() {
  if (!ayahPositions.length) return;
  const scrollY = scrollContainer.scrollTop;
  const viewH = scrollContainer.clientHeight;
  let found = ayahPositions[0];
  for (const a of ayahPositions) {
    const top = a.el ? a.el.offsetTop : 0;
    if (top <= scrollY + viewH * 0.35) found = a;
    else break;
  }
  if (found.num === currentAyah) return;

  pendingAyah = found;
  if (ayahUpdateScheduled) return;
  ayahUpdateScheduled = true;

  setTimeout(() => {
    ayahUpdateScheduled = false;
    if (!pendingAyah) return;
    const newAyah = pendingAyah;
    pendingAyah = null;
    if (newAyah.num === currentAyah) return;
    currentAyah = newAyah.num;
    ayahIndicator.textContent = 'الآية ' + toArabicNum(currentAyah);
  }, 80);
}

// ====== PROGRESS UI ======
function scheduleUI() {
  if (uiDirty || uiRafId) return;
  uiDirty = true;
  uiRafId = requestAnimationFrame(flushUI);
}

function getMaxScroll() {
  return Math.max(0, scrollContainer.scrollHeight - scrollContainer.clientHeight);
}

function flushUI() {
  uiRafId = null;
  uiDirty = false;
  const scrollY = scrollContainer.scrollTop;
  const maxS = getMaxScroll();
  const pct = maxS > 0 ? scrollY / maxS : 0;
  const pctNum = Math.round(pct * 100);
  if (!isSeeking) seekBar.value = Math.round(pct * 1000);
  seekBar.style.background = `linear-gradient(to left, rgba(200,169,110,0.6) ${pctNum}%, var(--track) ${pctNum}%)`;
  progressPct.textContent = pctNum + '%';
  const remaining = maxS - scrollY;
  if (remaining <= 2) { timeRemainingEl.textContent = 'تمت القراءة ✓'; return; }
  const speed = parseFloat(speedSlider.value);
  const secs = remaining / (speed * BASE_SPEED);
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60);
  timeRemainingEl.textContent = `متبقي: ${m}:${s < 10 ? '0'+s : s} د`;
  updateAyahIndicator();
}

// ====== AUTO-SCROLL ENGINE — sub-pixel smooth ======
// We keep a float accumulator (scrollAccum) as the true position,
// and write it directly to scrollTop every frame.
// To avoid the jitter caused by the browser rounding scrollTop to integers
// on read-back, we NEVER read scrollTop inside the tick loop — we only write it.
// For very low speeds the per-frame delta is < 1 px, so we batch it until
// it crosses an integer boundary before committing, keeping the DOM write
// to whole pixels while the logical position advances smoothly.

function tick(timestamp) {
  if (!isScrolling) return;
  if (lastTime === null) { lastTime = timestamp; rafId = requestAnimationFrame(tick); return; }

  const delta = Math.min(timestamp - lastTime, 50); // cap at 50 ms (handles tab switch / slow frames)
  lastTime = timestamp;

  const speed = parseFloat(speedSlider.value);
  const dy = (speed * BASE_SPEED * delta) / 1000;
  const maxS = getMaxScroll();

  scrollAccum = Math.min(scrollAccum + dy, maxS);

  // Only touch the DOM when the integer part changes — eliminates sub-pixel flicker
  const newWhole = Math.floor(scrollAccum);
  if (newWhole !== scrollWhole) {
    scrollWhole = newWhole;
    scrollContainer.scrollTop = scrollWhole;
  }

  scheduleUI();

  if (scrollAccum >= maxS) { stopScroll(); return; }
  rafId = requestAnimationFrame(tick);
}

function startScroll() {
  if (isScrolling) return;
  isScrolling = true;
  lastTime = null;
  scrollAccum = scrollContainer.scrollTop;
  scrollWhole = Math.floor(scrollAccum);
  scrollBtn.classList.add('active');
  // Hide header when auto-scroll starts
  headerVisible = false;
  pageHeader.classList.add('hidden-header');
  rafId = requestAnimationFrame(tick);
}

function stopScroll() {
  isScrolling = false;
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  lastTime = null;
  scrollBtn.classList.remove('active');
  // Show header when auto-scroll stops
  headerVisible = true;
  pageHeader.classList.remove('hidden-header');
  scheduleUI();
  saveProgress();
}

// ====== JUMP BUTTONS ======
jumpTopBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  stopScroll();
  scrollContainer.scrollTo({ top: 0, behavior: 'smooth' });
  showToast('انتقل إلى الأعلى');
});
jumpBottomBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  stopScroll();
  scrollContainer.scrollTo({ top: scrollContainer.scrollHeight, behavior: 'smooth' });
  showToast('انتقل إلى الأسفل');
});

// ====== SAVE / RESTORE ======
function saveProgress() {
  const data = { surah: currentSurah, posY: Math.round(scrollContainer.scrollTop), speed: speedSlider.value };
  localStorage.setItem('quranProgress', JSON.stringify(data));
}
function restoreProgress(surah) {
  try {
    const raw = localStorage.getItem('quranProgress');
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (data.surah === surah) return data;
  } catch {}
  return null;
}

// ====== BOOKMARKS ======
function loadBookmarks() {
  try { return JSON.parse(localStorage.getItem('quranBookmarks') || '[]'); }
  catch { return []; }
}
function saveBookmarks(bms) { localStorage.setItem('quranBookmarks', JSON.stringify(bms)); }

function renderBookmarkPanel() {
  const bms = loadBookmarks();
  bookmarkBtn.classList.toggle('has-bookmark', bms.some(b => b.surah === currentSurah));
  bmList.innerHTML = '';
  const forThis = bms.filter(b => b.surah === currentSurah);
  if (forThis.length === 0) {
    bmList.innerHTML = '<div class="bm-empty">لا توجد علامات في هذه السورة<br><small style="color:var(--muted);font-size:0.85em">اضغط على رقم الآية لحفظها</small></div>';
  } else {
    forThis.forEach((bm) => {
      const meta = SURAHS.find(s => s.n === bm.surah);
      const div = document.createElement('div');
      div.className = 'bm-item';
      div.innerHTML = `
        <span class="bm-item-text">سورة ${meta ? meta.name : ''} · الآية ${toArabicNum(bm.ayah)}</span>
        <button class="bm-item-del" data-id="${bm.id}" title="حذف">✕</button>
      `;
      div.addEventListener('click', (e) => {
        if (e.target.classList.contains('bm-item-del')) return;
        scrollContainer.scrollTo({ top: Math.min(bm.posY, getMaxScroll()), behavior: 'smooth' });
        closeBookmarkPanel();
        showToast('انتقلت إلى العلامة المرجعية');
      });
      div.querySelector('.bm-item-del').addEventListener('click', (e) => {
        e.stopPropagation();
        const all = loadBookmarks().filter(b => b.id !== bm.id);
        saveBookmarks(all);
        renderBookmarkPanel();
        showToast('حُذفت العلامة');
      });
      bmList.appendChild(div);
    });
  }
}

function addBookmark() {
  addBookmarkForAyah(currentAyah);
}

let bookmarkPanelOpen = false;
function openBookmarkPanel() { renderBookmarkPanel(); bookmarkPanel.classList.add('show'); bookmarkPanelOpen = true; }
function closeBookmarkPanel() { bookmarkPanel.classList.remove('show'); bookmarkPanelOpen = false; }
bookmarkBtn.addEventListener('click', (e) => { e.stopPropagation(); bookmarkPanelOpen ? closeBookmarkPanel() : openBookmarkPanel(); });
bmAddBtn.addEventListener('click', (e) => { e.stopPropagation(); addBookmark(); });
bookmarkPanel.addEventListener('click', (e) => e.stopPropagation());

// ====== SURAH NAV (bottom) ======
function updateSurahNavButtons() {
  const prev = SURAHS.find(s => s.n === currentSurah - 1);
  const next = SURAHS.find(s => s.n === currentSurah + 1);
  prevSurahBtn.disabled = !prev;
  nextSurahBtn.disabled = !next;
  prevSurahName.textContent = prev ? 'سورة ' + prev.name : 'السورة السابقة';
  nextSurahName.textContent = next ? 'سورة ' + next.name : 'السورة التالية';
}

prevSurahBtn.addEventListener('click', () => {
  if (currentSurah > 1) loadSurah(currentSurah - 1);
});
nextSurahBtn.addEventListener('click', () => {
  if (currentSurah < 114) loadSurah(currentSurah + 1);
});

// ====== LOAD SURAH ======
async function loadSurah(surahNum) {
  stopScroll();
  currentSurah = surahNum;
  scrollContainer.scrollTop = 0;
  scrollAccum = 0;
  lastScrollY = 0;
  headerVisible = true;
  pageHeader.classList.remove('hidden-header');
  ayahPositions = [];
  currentAyah = 1;

  const meta = SURAHS.find(s => s.n === surahNum);
  surahTitle.textContent = 'سورة ' + (meta ? meta.name : '');
  surahInfo.textContent = meta ? toArabicNum(meta.ayat) + ' آية' : '';
  ayahIndicator.textContent = 'الآية ١';

  quranText.textContent = '';
  loadingScreen.classList.remove('hidden');
  loadingScreen.style.opacity = '1';
  loadingScreen.style.pointerEvents = 'all';

  basmalahEl.style.display = (surahNum === 9) ? 'none' : '';
  updateSurahNavButtons();

  try {
    const res = await fetch(`surah/${surahNum}.json`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    quranText.innerHTML = data.content +
      '<br><p class="p5">لا تنسنا من دعوة صالحة بظهر الغيب</p><br>';

    // Wrap each ayah label in a span for tracking
    quranText.querySelectorAll('label').forEach(label => {
      const match = label.textContent.trim().match(/\d+/);
      if (match) {
        const span = document.createElement('span');
        span.setAttribute('data-ayah', match[0]);
        const parent = label.parentNode;
        parent.insertBefore(span, label);
        span.appendChild(label);
      }
    });

    // Attach tap-to-bookmark on ayah numbers
    attachAyahTapHandlers();

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        buildAyahPositions();
        const saved = restoreProgress(surahNum);
        if (saved && saved.posY > 0) {
          scrollContainer.scrollTop = Math.min(saved.posY, getMaxScroll());
          scrollAccum = scrollContainer.scrollTop;
          speedSlider.value = saved.speed || 0.5;
          updateSliderUI();
          showToast('استُؤنفت القراءة من حيث توقفت');
        }
        scheduleUI();
        updateBookmarkDot();
        refreshBookmarkHighlight();
        // Hide loading screen
        loadingScreen.style.opacity = '0';
        loadingScreen.style.pointerEvents = 'none';
        setTimeout(() => {
          loadingScreen.classList.add('hidden');
        }, 420);
      });
    });

  } catch (err) {
    quranText.innerHTML = `
      <div style="text-align:center; padding:40px; font-family:system-ui; color:var(--muted);">
        <div style="font-size:2em; margin-bottom:12px;">⚠️</div>
        <div style="margin-bottom:16px; font-size:0.9em;">تعذر تحميل السورة</div>
        <button onclick="loadSurah(${surahNum})" style="
          background: var(--gold); color: #111; border: none;
          padding: 8px 20px; border-radius: 20px; cursor: pointer;
          font-family: system-ui; font-size: 0.85em;
        ">إعادة المحاولة</button>
      </div>`;
    loadingScreen.classList.add('hidden');
    loadingScreen.style.pointerEvents = 'none';
  }
}

function updateBookmarkDot() {
  const bms = loadBookmarks();
  bookmarkBtn.classList.toggle('has-bookmark', bms.some(b => b.surah === currentSurah));
}

// ====== SEEK BAR ======
seekBar.addEventListener('mousedown',  () => { isSeeking = true; });
seekBar.addEventListener('touchstart', () => { isSeeking = true; }, { passive: true });
seekBar.addEventListener('input', () => {
  const maxS = getMaxScroll();
  const newY = (parseInt(seekBar.value) / 1000) * maxS;
  scrollContainer.scrollTop = newY;
  scrollAccum = newY;
  scheduleUI();
});
seekBar.addEventListener('mouseup',  () => { isSeeking = false; scheduleUI(); saveProgress(); });
seekBar.addEventListener('touchend', () => { isSeeking = false; scheduleUI(); saveProgress(); }, { passive: true });

// ====== WHEEL / TOUCH — stop auto-scroll only on actual manual swipe ======
let touchStartY = 0;
scrollContainer.addEventListener('wheel', () => {
  if (isScrolling) stopScroll();
}, { passive: true });
scrollContainer.addEventListener('touchstart', (e) => {
  touchStartY = e.touches[0].clientY;
}, { passive: true });
scrollContainer.addEventListener('touchmove', (e) => {
  const dy = Math.abs(e.touches[0].clientY - touchStartY);
  if (dy > 8 && isScrolling) stopScroll();
}, { passive: true });

// ====== KEYBOARD SHORTCUTS ======
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  switch(e.code) {
    case 'Space':
      e.preventDefault();
      isScrolling ? stopScroll() : startScroll();
      break;
    case 'ArrowUp':
    case 'ArrowLeft':
      e.preventDefault();
      speedSlider.value = Math.max(parseFloat(speedSlider.value) - 0.1, +speedSlider.min).toFixed(2);
      updateSliderUI();
      showToast('السرعة: ×' + parseFloat(speedSlider.value).toFixed(1));
      break;
    case 'ArrowDown':
    case 'ArrowRight':
      e.preventDefault();
      speedSlider.value = Math.min(parseFloat(speedSlider.value) + 0.1, +speedSlider.max).toFixed(2);
      updateSliderUI();
      showToast('السرعة: ×' + parseFloat(speedSlider.value).toFixed(1));
      break;
    case 'KeyM': openSidebar(); break;
    case 'Escape': closeSidebar(); closeBookmarkPanel(); break;
    case 'KeyB': e.preventDefault(); addBookmark(); break;
  }
});

// ====== CONTROLS ======
function updateSliderUI() {
  const val = parseFloat(speedSlider.value);
  const pct = ((val - +speedSlider.min) / (+speedSlider.max - +speedSlider.min)) * 100;
  speedSlider.style.background = `linear-gradient(to left, rgba(200,169,110,0.8) ${pct}%, var(--track) ${pct}%)`;
  speedBadge.textContent = `×${val.toFixed(1)}`;
  updateSpeedBtnStates();
  scheduleUI();
}

scrollBtn.addEventListener('click', (e) => { e.stopPropagation(); isScrolling ? stopScroll() : startScroll(); });
plusBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  speedSlider.value = Math.min(parseFloat(speedSlider.value) + 0.1, +speedSlider.max).toFixed(2);
  updateSliderUI();
});
minusBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  speedSlider.value = Math.max(parseFloat(speedSlider.value) - 0.1, +speedSlider.min).toFixed(2);
  updateSliderUI();
});
speedSlider.addEventListener('click', (e) => e.stopPropagation());
speedSlider.addEventListener('input', updateSliderUI);
seekBar.addEventListener('click', (e) => e.stopPropagation());

// Close bookmark panel when user scrolls
let isScrollingTouch = false;
scrollContainer.addEventListener('touchstart', () => { isScrollingTouch = false; }, { passive: true });
scrollContainer.addEventListener('touchmove', () => {
  if (!isScrollingTouch) {
    isScrollingTouch = true;
    if (bookmarkPanelOpen) closeBookmarkPanel();
  }
}, { passive: true });

document.body.addEventListener('click', (e) => {
  if (isScrollingTouch) { isScrollingTouch = false; return; }
  if (bookmarkPanelOpen && !bookmarkPanel.contains(e.target) && e.target !== bookmarkBtn) {
    closeBookmarkPanel();
    return;
  }
  if (!scrollPanel.contains(e.target) && !sidebar.contains(e.target) && !bookmarkPanel.contains(e.target)) {
    scrollPanel.classList.toggle('hidden');
  }
});

window.addEventListener('resize', scheduleUI);
window.addEventListener('beforeunload', saveProgress);

// ====== OFFLINE ======
window.addEventListener('online', () => offlineBadge.classList.remove('show'));
window.addEventListener('offline', () => offlineBadge.classList.add('show'));
if (!navigator.onLine) offlineBadge.classList.add('show');

// ====== SERVICE WORKER ======
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(reg => {
      reg.addEventListener('updatefound', () => showToast('🔄 تحديث متاح، أعد تحميل الصفحة'));
    }).catch(() => {});
  });
}

// ====== INIT ======
window.addEventListener('load', () => {
  try {
    const raw = localStorage.getItem('quranProgress');
    if (raw) {
      const data = JSON.parse(raw);
      if (data.speed) speedSlider.value = data.speed;
      if (data.surah) currentSurah = data.surah;
    }
  } catch {}
  updateSliderUI();
  loadSurah(currentSurah);
});
</script>

</body>
</html>
