<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>القرآن الكريم</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preload" href="https://cdn.jsdelivr.net/gh/thetruetruth/quran-data-kfgqpc@main/hafs/font/hafs.18.woff2" as="font" type="font/woff2" crossorigin>

  <style>
    @font-face {
      font-family: 'Conv_original-hafs';
      src: url('https://cdn.jsdelivr.net/gh/thetruetruth/quran-data-kfgqpc@main/hafs/font/hafs.18.woff2') format('woff2'),
           url('https://cdn.jsdelivr.net/gh/thetruetruth/quran-data-kfgqpc@main/hafs/font/hafs.18.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    /* ====== CSS VARIABLES (THEMES) ====== */
    :root {
      --bg: #1a1a1a;
      --bg2: #111;
      --text: #e8e8e8;
      --gold: #c8a96e;
      --gold2: rgba(200,169,110,0.6);
      --green: #4caf7d;
      --muted: #888;
      --border: #333;
      --panel-bg: rgba(255,255,255,0.04);
      --panel-border: rgba(255,255,255,0.09);
      --track: rgba(255,255,255,0.07);
      --highlight-bg: rgba(200,169,110,0.12);
      --highlight-border: rgba(200,169,110,0.4);
      --sidebar-bg: #0e0e0e;
      --sidebar-item-hover: rgba(255,255,255,0.05);
      --sidebar-item-active: rgba(200,169,110,0.12);
    }

    body.light {
      --bg: #f5f0e8;
      --bg2: #ede7d9;
      --text: #1a1a1a;
      --gold: #8a6a2e;
      --gold2: rgba(138,106,46,0.5);
      --green: #2d7a52;
      --muted: #666;
      --border: #d0c8b8;
      --panel-bg: rgba(0,0,0,0.04);
      --panel-border: rgba(0,0,0,0.1);
      --track: rgba(0,0,0,0.08);
      --highlight-bg: rgba(138,106,46,0.1);
      --highlight-border: rgba(138,106,46,0.35);
      --sidebar-bg: #ede7d9;
      --sidebar-item-hover: rgba(0,0,0,0.04);
      --sidebar-item-active: rgba(138,106,46,0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      overflow: hidden;
      height: 100%;
      width: 100%;
      background-color: var(--bg);
      color: var(--text);
      direction: rtl;
      touch-action: none;
      transition: background-color 0.3s, color 0.3s;
    }

    /* ====== SIDEBAR ====== */
    #sidebar {
      position: fixed;
      top: 0; right: 0;
      width: 280px;
      height: 100%;
      background: var(--sidebar-bg);
      border-left: 1px solid var(--border);
      z-index: 2000;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
      will-change: transform;
    }
    #sidebar.open { transform: translateX(0); }

    .sidebar-header {
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-header h2 {
      font-family: Conv_original-hafs, serif;
      font-size: 1.1em;
      color: var(--gold);
      font-weight: 400;
    }
    .sidebar-close {
      background: none; border: none;
      color: var(--muted); font-size: 1.3em;
      cursor: pointer; padding: 4px 8px;
      border-radius: 8px;
      transition: background 0.2s, color 0.2s;
    }
    .sidebar-close:hover { background: var(--sidebar-item-hover); color: var(--text); }

    .sidebar-search {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-search input {
      width: 100%;
      background: var(--track);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 10px;
      border-radius: 10px;
      font-family: system-ui, sans-serif;
      font-size: 0.82em;
      outline: none;
      direction: rtl;
      transition: border-color 0.2s;
    }
    .sidebar-search input:focus { border-color: var(--gold); }
    .sidebar-search input::placeholder { color: var(--muted); }

    #surahList {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }
    #surahList::-webkit-scrollbar { width: 4px; }
    #surahList::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .surah-item {
      display: flex;
      align-items: center;
      padding: 11px 14px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: background 0.15s;
      gap: 10px;
    }
    body.light .surah-item { border-bottom: 1px solid rgba(0,0,0,0.04); }
    .surah-item:hover { background: var(--sidebar-item-hover); }
    .surah-item.active { background: var(--sidebar-item-active); }
    .surah-num {
      font-size: 0.7em;
      color: var(--muted);
      min-width: 24px;
      font-family: system-ui, sans-serif;
      font-variant-numeric: tabular-nums;
    }
    .surah-name {
      font-family: Conv_original-hafs, serif;
      font-size: 1em;
      color: var(--text);
      flex: 1;
    }
    .surah-count {
      font-size: 0.65em;
      color: var(--muted);
      font-family: system-ui, sans-serif;
    }

    #sidebarOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s;
    }
    #sidebarOverlay.visible { opacity: 1; pointer-events: all; }

    /* ====== MAIN ====== */
    #viewport {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow: hidden;
    }

    #scroller {
      will-change: transform;
      transform: translateY(0px);
      contain: layout style;
    }

    .page-header {
      background-color: var(--bg2);
      padding: 14px 20px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      transition: background-color 0.3s;
    }
    .header-center { flex: 1; }
    .page-header h1 {
      font-family: Conv_original-hafs, serif;
      font-size: 1.3em;
      font-weight: 400;
      color: var(--gold);
    }
    .header-meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 4px;
    }
    .header-meta span {
      color: var(--muted);
      font-size: 0.72em;
      font-family: system-ui, sans-serif;
    }
    .ayah-indicator {
      color: var(--gold) !important;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .header-btns {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .hbtn {
      background: var(--track);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 34px; height: 34px;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9em;
      transition: background 0.2s, color 0.2s;
      flex-shrink: 0;
    }
    .hbtn:hover { background: var(--sidebar-item-hover); color: var(--text); }
    .hbtn.active { background: var(--sidebar-item-active); color: var(--gold); border-color: var(--gold2); }

    .font-controls {
      display: flex;
      gap: 4px;
    }
    .font-btn {
      background: var(--track);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 9px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8em;
      font-family: system-ui, sans-serif;
      transition: background 0.2s, color 0.2s;
    }
    .font-btn:hover { background: var(--sidebar-item-hover); color: var(--text); }

    .basmalah {
      text-align: center;
      padding: 28px 20px 8px;
      font-family: Conv_original-hafs, serif;
      font-size: 2.2em;
      color: var(--text);
      line-height: 1.8em;
    }

    .quran-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 10px 25px 170px;
    }

    #quranText {
      font-size: 2em;
      text-align: justify;
      font-family: Conv_original-hafs, serif;
      color: var(--text);
      font-weight: 400;
      line-height: 1.85em;
    }

    b { font-weight: 400; color: var(--gold); }
    label {
      font-family: Conv_original-hafs, serif;
      color: var(--green);
      font-size: 0.75em;
      cursor: default;
    }

    /* Highlighted ayah */
    .ayah-highlight {
      background: var(--highlight-bg);
      border-radius: 6px;
      outline: 1.5px solid var(--highlight-border);
      transition: background 0.3s, outline 0.3s;
    }

    .p5 {
      text-align: center;
      color: var(--muted);
      font-size: 0.5em;
      margin-top: 30px;
      font-family: sans-serif;
    }

    /* ====== SCROLL PANEL ====== */
    .scroll-panel {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--panel-bg);
      backdrop-filter: blur(20px) saturate(1.8) brightness(1.1);
      -webkit-backdrop-filter: blur(20px) saturate(1.8) brightness(1.1);
      border: 1px solid var(--panel-border);
      border-radius: 22px;
      padding: 13px 18px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      z-index: 1000;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35), 0 2px 8px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.08);
      font-family: system-ui, -apple-system, sans-serif;
      width: 88%;
      max-width: 320px;
      transition: opacity 0.3s ease, transform 0.3s ease;
      contain: layout style;
    }

    .scroll-panel.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(10px);
    }

    .progress-section { width: 100%; display: flex; flex-direction: column; gap: 5px; }
    .progress-labels { display: flex; justify-content: space-between; align-items: center; }
    .progress-label { font-size: 0.65em; color: rgba(128,128,128,0.6); letter-spacing: 0.03em; }
    .progress-pct { font-size: 0.65em; font-weight: 700; color: var(--gold); font-variant-numeric: tabular-nums; }

    .seek-bar {
      -webkit-appearance: none;
      width: 100%; height: 5px; border-radius: 4px;
      outline: none; cursor: pointer;
      background: var(--track);
    }
    .seek-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 15px; height: 15px; border-radius: 50%;
      background: #fff;
      border: 2px solid rgba(200,169,110,0.9);
      cursor: pointer;
      box-shadow: 0 1px 6px rgba(0,0,0,0.5);
      transition: transform 0.15s;
    }
    .seek-bar:active::-webkit-slider-thumb { transform: scale(1.25); }

    .divider { width: 100%; height: 1px; background: rgba(128,128,128,0.1); }

    .main-controls {
      display: flex; align-items: center;
      justify-content: center; gap: 16px; width: 100%;
    }

    .step-btn {
      background: var(--track);
      border: 1px solid var(--panel-border);
      color: rgba(128,128,128,0.6);
      width: 32px; height: 32px; border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.05em;
      transition: background 0.2s, color 0.2s;
      flex-shrink: 0;
    }
    .step-btn:hover { background: rgba(200,169,110,0.14); color: var(--gold); }

    .scroll-btn {
      background: rgba(200,169,110,0.9);
      color: #111;
      border: none;
      width: 46px; height: 46px; border-radius: 50%;
      cursor: pointer;
      font-size: 1.1em;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 14px rgba(200,169,110,0.3), inset 0 1px 0 rgba(255,255,255,0.25);
      transition: transform 0.15s, background 0.2s;
      flex-shrink: 0;
    }
    .scroll-btn:active { transform: scale(0.92); }
    .scroll-btn.active { background: rgba(255,255,255,0.88); }

    .pause-icon {
      display: none;
      width: 11px; height: 13px;
      border-left: 3.5px solid #111;
      border-right: 3.5px solid #111;
    }
    .scroll-btn.active .play-text  { display: none; }
    .scroll-btn.active .pause-icon { display: inline-block; }

    .speed-section { width: 100%; display: flex; align-items: center; gap: 8px; }
    .speed-label { font-size: 0.62em; color: rgba(128,128,128,0.45); flex-shrink: 0; letter-spacing: 0.02em; }

    .speed-slider {
      -webkit-appearance: none;
      flex: 1; height: 3px; border-radius: 2px;
      outline: none; cursor: pointer;
      background: var(--track);
    }
    .speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 11px; height: 11px; border-radius: 50%;
      background: rgba(200,169,110,0.9);
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
      transition: transform 0.15s;
    }
    .speed-slider:active::-webkit-slider-thumb { transform: scale(1.4); }

    .speed-badge {
      font-size: 0.62em; font-weight: 700;
      color: rgba(200,169,110,0.8);
      font-variant-numeric: tabular-nums;
      min-width: 30px; text-align: left; flex-shrink: 0;
    }

    .time-remaining { font-size: 0.62em; color: rgba(128,128,128,0.4); font-variant-numeric: tabular-nums; }

    /* ====== TOAST ====== */
    #toast {
      position: fixed;
      bottom: 110px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(30,30,30,0.92);
      color: #e8e8e8;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.78em;
      font-family: system-ui, sans-serif;
      z-index: 3000;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }
    body.light #toast { background: rgba(240,235,225,0.95); color: #1a1a1a; border: 1px solid var(--border); }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ====== LOADING ====== */
    #loadingScreen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      transition: opacity 0.4s;
    }
    #loadingScreen.hidden { opacity: 0; pointer-events: none; }
    .loader-text {
      font-family: Conv_original-hafs, serif;
      font-size: 1.8em;
      color: var(--gold);
    }
    .loader-sub {
      font-family: system-ui, sans-serif;
      font-size: 0.75em;
      color: var(--muted);
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--track);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ====== RESPONSIVE ====== */
    @media (max-width: 600px) {
      #quranText { font-size: 1.6em; }
      .quran-container { padding: 10px 15px 165px; }
      .basmalah { font-size: 1.6em; }
      #sidebar { width: 260px; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
    }
  </style>

</head>

<!-- Loading Screen -->

  <div class="loader-text">القرآن الكريم</div>
  <div class="spinner"></div>
  <div class="loader-sub">جاري تحميل السور...</div>
</div>

<!-- Sidebar Overlay -->

<div id="sidebarOverlay"></div>

<!-- Sidebar -->

<div id="sidebar">

    <h2>فهرس السور</h2>

    <input type="text" id="surahSearch" placeholder="ابحث عن سورة...">
  </div>
  <div id="surahList"></div>
</div>

<!-- Main Viewport -->

<div id="viewport">
  <div id="scroller">

      <div class="header-btns">

      </div>
    </div>


<div class="basmalah">بِسۡمِ ٱللَّهِ ٱلرَّحۡمَٰنِ ٱلرَّحِيمِ</div>
<div class="quran-container">

</div>


  </div>
</div>

<!-- Scroll Panel -->

<div class="scroll-panel" id="scrollPanel">

      <span class="progress-pct" id="progressPct">0%</span>

    <input type="range" id="seekBar" class="seek-bar" min="0" max="1000" step="1" value="0">
  </div>
  <div class="divider"></div>
  <div class="main-controls">
    <button class="step-btn" id="minusBtn" title="تبطيء">−</button>
    <button class="scroll-btn" id="scrollBtn">
      <span class="play-text">▶</span>
      <span class="pause-icon"></span>

    <button class="step-btn" id="plusBtn" title="تسريع">+</button>
  </div>
  <div class="speed-section">
    <span class="speed-label">السرعة</span>
    <input type="range" id="speedSlider" class="speed-slider" min="0.05" max="3.0" step="0.05" value="0.5">
    <span class="speed-badge" id="speedBadge">×0.5</span>
  </div>
  <div class="time-remaining" id="timeRemaining">متبقي: --:--</div>
</div>

<!-- Toast -->

<div id="toast"></div>

// ====== DOM REFS ======
const scrollPanel     = document.getElementById('scrollPanel');
const scrollBtn       = document.getElementById('scrollBtn');
const plusBtn         = document.getElementById('plusBtn');
const minusBtn        = document.getElementById('minusBtn');
const speedSlider     = document.getElementById('speedSlider');
const speedBadge      = document.getElementById('speedBadge');
const timeRemainingEl = document.getElementById('timeRemaining');
const progressPct     = document.getElementById('progressPct');
const seekBar         = document.getElementById('seekBar');
const quranText       = document.getElementById('quranText');
const scroller        = document.getElementById('scroller');
const viewport        = document.getElementById('viewport');
const themeBtn        = document.getElementById('themeBtn');
const fontPlus        = document.getElementById('fontPlus');
const fontMinus       = document.getElementById('fontMinus');
const menuBtn         = document.getElementById('menuBtn');
const sidebar         = document.getElementById('sidebar');
const sidebarOverlay  = document.getElementById('sidebarOverlay');
const sidebarClose    = document.getElementById('sidebarClose');
const surahList       = document.getElementById('surahList');
const surahSearch     = document.getElementById('surahSearch');
const surahTitle      = document.getElementById('surahTitle');
const surahInfo       = document.getElementById('surahInfo');
const ayahIndicator   = document.getElementById('ayahIndicator');
const toastEl         = document.getElementById('toast');
const loadingScreen   = document.getElementById('loadingScreen');

// ====== STATE ======
const BASE_SPEED = 40;
let isScrolling = false;
let rafId = null;
let lastTime = null;
let posY = 0;
let maxScroll = 0;
let uiFrame = 0;
let isSeeking = false;
let uiRafId = null;
let uiDirty = false;
let currentSurah = 2;
let fontSize = parseFloat(localStorage.getItem('fontSize') || '2');
let ayahPositions = [];
let currentAyah = 1;
let highlightedEl = null;

// ====== TOAST ======
let toastTimer = null;
function showToast(msg, duration = 2000) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), duration);
}

// ====== THEME ======
function applyTheme(light) {
  document.body.classList.toggle('light', light);
  themeBtn.textContent = light ? '☀️' : '🌙';
  localStorage.setItem('theme', light ? 'light' : 'dark');
}
const savedTheme = localStorage.getItem('theme');
applyTheme(savedTheme === 'light');
themeBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  applyTheme(!document.body.classList.contains('light'));

});

// ====== FONT SIZE ======
function applyFontSize(size) {
  fontSize = Math.max(1.2, Math.min(3.5, size));
  quranText.style.fontSize = fontSize + 'em';
  localStorage.setItem('fontSize', fontSize);
}
applyFontSize(fontSize);
fontPlus.addEventListener('click', (e) => { e.stopPropagation(); applyFontSize(fontSize + 0.15); recalcMax(); });
fontMinus.addEventListener('click', (e) => { e.stopPropagation(); applyFontSize(fontSize - 0.15); recalcMax(); });

// ====== SIDEBAR ======
function buildSurahList(filter = '') {
  surahList.innerHTML = '';
  const filtered = SURAHS.filter(s => s.name.includes(filter) || String(s.n).includes(filter));
  filtered.forEach(s => {
    const div = document.createElement('div');
    div.className = 'surah-item' + (s.n === currentSurah ? ' active' : '');
    div.innerHTML = `<span class="surah-num">${s.n}</span><span class="surah-name">سورة ${s.name}</span><span class="surah-count">${s.ayat} آية</span>`;
    div.addEventListener('click', () => { loadSurah(s.n); closeSidebar(); });
    surahList.appendChild(div);
  });
}

function openSidebar() {
  sidebar.classList.add('open');
  sidebarOverlay.classList.add('visible');
  buildSurahList();
  const active = surahList.querySelector('.active');
  if (active) active.scrollIntoView({ block: 'center' });
}
function closeSidebar() {
  sidebar.classList.remove('open');
  sidebarOverlay.classList.remove('visible');
}

menuBtn.addEventListener('click', (e) => { e.stopPropagation(); openSidebar(); });
sidebarClose.addEventListener('click', closeSidebar);
sidebarOverlay.addEventListener('click', closeSidebar);
surahSearch.addEventListener('input', () => buildSurahList(surahSearch.value.trim()));

// ====== AYAH TRACKING ======
function buildAyahPositions() {
  ayahPositions = [];
  const labels = quranText.querySelectorAll('label');
  labels.forEach(label => {
    const text = label.textContent.trim();
    const match = text.match(/\d+/);
    if (match) {
      ayahPositions.push({ el: label.parentElement || label, num: parseInt(match[0]) });
    }
  });
}

function toArabicNum(n) {
  return String(n).replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
}

function updateAyahIndicator() {
  if (!ayahPositions.length) return;
  const viewTop = posY;
  let found = ayahPositions[0];
  for (const a of ayahPositions) {
    const top = a.el.offsetTop;
    if (top <= viewTop + viewport.offsetHeight * 0.35) found = a;
    else break;
  }
  if (found.num !== currentAyah) {
    currentAyah = found.num;
    ayahIndicator.textContent = 'الآية ' + toArabicNum(currentAyah);
    if (highlightedEl) highlightedEl.classList.remove('ayah-highlight');
    highlightedEl = found.el.closest ? found.el.closest('span[data-ayah]') : null;
    if (!highlightedEl) {
      highlightedEl = quranText.querySelector(`span[data-ayah="${currentAyah}"]`);
    }
    if (highlightedEl) highlightedEl.classList.add('ayah-highlight');
  }
}

// ====== PROGRESS UI ======
function scheduleUI() {
  if (uiDirty || uiRafId) return;
  uiDirty = true;
  uiRafId = requestAnimationFrame(flushUI);
}

function flushUI() {
  uiRafId = null;
  uiDirty = false;
  const pct = maxScroll > 0 ? posY / maxScroll : 0;
  const pctNum = Math.round(pct * 100);
  if (!isSeeking) seekBar.value = Math.round(pct * 1000);
  seekBar.style.background = `linear-gradient(to left, rgba(200,169,110,0.6) ${pctNum}%, var(--track) ${pctNum}%)`;
  progressPct.textContent = pctNum + '%';
  const remaining = maxScroll - posY;
  if (remaining <= 2) { timeRemainingEl.textContent = 'تمت القراءة ✓'; return; }
  const speed = parseFloat(speedSlider.value);
  const secs = remaining / (speed * BASE_SPEED);
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60);
  timeRemainingEl.textContent = `متبقي: ${m}:${s < 10 ? '0'+s : s} د`;
  updateAyahIndicator();
}

// ====== SCROLL ENGINE ======
function tick(timestamp) {
  if (!isScrolling) return;
  if (lastTime === null) lastTime = timestamp;
  const delta = Math.min(timestamp - lastTime, 64);
  lastTime = timestamp;
  posY += (parseFloat(speedSlider.value) * BASE_SPEED * delta) / 1000;
  if (posY > maxScroll) posY = maxScroll;
  scroller.style.transform = `translateY(${-posY}px)`;
  if (++uiFrame % 12 === 0) scheduleUI();
  if (posY >= maxScroll) { stopScroll(); return; }
  rafId = requestAnimationFrame(tick);
}

function startScroll() {
  if (isScrolling) return;
  isScrolling = true; lastTime = null; uiFrame = 0;
  scrollBtn.classList.add('active');
  rafId = requestAnimationFrame(tick);
}

function stopScroll() {
  isScrolling = false;
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  scrollBtn.classList.remove('active');
  scheduleUI();
  saveProgress();
}

function recalcMax() {
  maxScroll = scroller.offsetHeight - viewport.offsetHeight;
  if (maxScroll < 0) maxScroll = 0;
}

// ====== SAVE / RESTORE ======
function saveProgress() {
  const data = {
    surah: currentSurah,
    posY: Math.round(posY),
    speed: speedSlider.value
  };
  localStorage.setItem('quranProgress', JSON.stringify(data));
}

function restoreProgress(surah) {
  try {
    const raw = localStorage.getItem('quranProgress');
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (data.surah === surah) return data;
  } catch {}
  return null;
}

// ====== LOAD SURAH ======
async function loadSurah(surahNum) {
  stopScroll();
  currentSurah = surahNum;
  posY = 0;
  scroller.style.transform = 'translateY(0px)';
  ayahPositions = [];
  currentAyah = 1;
  if (highlightedEl) { highlightedEl.classList.remove('ayah-highlight'); highlightedEl = null; }

  const meta = SURAHS.find(s => s.n === surahNum);
  surahTitle.textContent = 'سورة ' + (meta ? meta.name : '');
  surahInfo.textContent = meta ? toArabicNum(meta.ayat) + ' آية' : '';
  ayahIndicator.textContent = 'الآية ١';

  quranText.textContent = '';
  loadingScreen.classList.remove('hidden');
  loadingScreen.style.opacity = '1';
  loadingScreen.style.pointerEvents = 'all';

  // إخفاء البسملة لسورة التوبة فقط
  const basmalah = document.querySelector('.basmalah');
  basmalah.style.display = (surahNum === 9) ? 'none' : '';

  try {
    const res = await fetch(`surah/${surahNum}.json`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    quranText.innerHTML = data.content +
      '<br><p class="p5">لا تنسنا من دعوة صالحة بظهر الغيب</p><br><br>';

    // Tag ayah spans for highlighting
    const labels = quranText.querySelectorAll('label');
    labels.forEach(label => {
      const match = label.textContent.trim().match(/\d+/);
      if (match) {
        const span = document.createElement('span');
        span.setAttribute('data-ayah', match[0]);
        const parent = label.parentNode;
        parent.insertBefore(span, label);
        span.appendChild(label);
      }
    });

    requestAnimationFrame(() => {
      recalcMax();
      buildAyahPositions();

      const saved = restoreProgress(surahNum);
      if (saved && saved.posY > 0) {
        posY = Math.min(saved.posY, maxScroll);
        scroller.style.transform = `translateY(${-posY}px)`;
        speedSlider.value = saved.speed || 0.5;
        updateSliderUI();
        showToast('استُؤنفت القراءة من حيث توقفت');
      }
      scheduleUI();

      loadingScreen.style.opacity = '0';
      setTimeout(() => {
        loadingScreen.classList.add('hidden');
        loadingScreen.style.pointerEvents = 'none';
      }, 400);
    });

  } catch (err) {
    quranText.innerHTML = `
      <div style="text-align:center; padding:40px; font-family:system-ui; color:var(--muted);">
        <div style="font-size:2em; margin-bottom:12px;">⚠️</div>
        <div style="margin-bottom:16px; font-size:0.9em;">تعذر تحميل السورة</div>
        <button onclick="loadSurah(${surahNum})" style="
          background: var(--gold); color: #111; border: none;
          padding: 8px 20px; border-radius: 20px; cursor: pointer;
          font-family: system-ui; font-size: 0.85em;
        ">إعادة المحاولة</button>
      </div>`;
    loadingScreen.classList.add('hidden');
    loadingScreen.style.pointerEvents = 'none';
  }
}

// ====== SEEK BAR ======
seekBar.addEventListener('mousedown',  () => { isSeeking = true; });
seekBar.addEventListener('touchstart', () => { isSeeking = true; }, { passive: true });
seekBar.addEventListener('touchmove',  (e) => e.stopPropagation(), { passive: true });
seekBar.addEventListener('input', () => {
  posY = Math.max(0, Math.min(maxScroll, (parseInt(seekBar.value) / 1000) * maxScroll));
  scroller.style.transform = `translateY(${-posY}px)`;
  scheduleUI();
});
seekBar.addEventListener('mouseup',  () => { isSeeking = false; scheduleUI(); saveProgress(); });
seekBar.addEventListener('touchend', () => { isSeeking = false; scheduleUI(); saveProgress(); }, { passive: true });

// ====== TOUCH SCROLL ======
let touchStartY=0, touchStartPos=0, touchLastY=0, touchLastTime=0;
let touchVelocity=0, isTouching=false, movedEnough=false;
let inertiaId=null, pendingDY=null;

function cancelInertia() {
  if (inertiaId) { cancelAnimationFrame(inertiaId); inertiaId = null; }
}

viewport.addEventListener('touchstart', (e) => {
  if (e.touches.length > 1) return;
  cancelInertia();
  isTouching=true; movedEnough=false; touchVelocity=0; pendingDY=null;
  touchStartY=e.touches[0].clientY; touchLastY=touchStartY;
  touchLastTime=performance.now(); touchStartPos=posY;
}, { passive: true });

viewport.addEventListener('touchmove', (e) => {
  if (!isTouching || e.touches.length > 1) return;
  const cy=e.touches[0].clientY, now=performance.now(), dy=touchStartY-cy;
  if (!movedEnough && Math.abs(dy) > 8) { movedEnough=true; stopScroll(); touchStartPos=posY; }
  if (!movedEnough) return;
  const dtms=now-touchLastTime;
  if (dtms>0) touchVelocity=(touchLastY-cy)/dtms;
  touchLastY=cy; touchLastTime=now; pendingDY=touchStartY-cy;
  if (!rafId) rafId=requestAnimationFrame(applyTouch);
}, { passive: true });

function applyTouch() {
  rafId=null;
  if (pendingDY===null) return;
  posY=Math.max(0,Math.min(maxScroll,touchStartPos+pendingDY));
  scroller.style.transform=`translateY(${-posY}px)`;
  scheduleUI();
}

viewport.addEventListener('touchend', () => {
  if (!isTouching) return;
  isTouching=false;
  if (!movedEnough) return;
  let velocity=touchVelocity;
  function inertia() {
    velocity*=0.93;
    if (Math.abs(velocity)<0.05) { saveProgress(); return; }
    posY=Math.max(0,Math.min(maxScroll,posY+velocity*16));
    scroller.style.transform=`translateY(${-posY}px)`;
    scheduleUI();
    inertiaId=requestAnimationFrame(inertia);
  }
  inertiaId=requestAnimationFrame(inertia);
}, { passive: true });

// ====== WHEEL ======
let wheelPending=0, wheelRafId=null;
viewport.addEventListener('wheel', (e) => {
  e.preventDefault(); stopScroll();
  wheelPending+=e.deltaY;
  if (!wheelRafId) wheelRafId=requestAnimationFrame(applyWheel);
}, { passive: false });
function applyWheel() {
  wheelRafId=null;
  posY=Math.max(0,Math.min(maxScroll,posY+wheelPending));
  wheelPending=0;
  scroller.style.transform=`translateY(${-posY}px)`;
  scheduleUI();
  saveProgress();
}

// ====== KEYBOARD SHORTCUTS ======
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  switch(e.code) {
    case 'Space':
      e.preventDefault();
      isScrolling ? stopScroll() : startScroll();
      break;
    case 'ArrowUp':
    case 'ArrowLeft':
      e.preventDefault();
      speedSlider.value = Math.max(parseFloat(speedSlider.value) - 0.1, +speedSlider.min).toFixed(2);
      updateSliderUI();
      showToast('السرعة: ×' + parseFloat(speedSlider.value).toFixed(1));
      break;
    case 'ArrowDown':
    case 'ArrowRight':
      e.preventDefault();
      speedSlider.value = Math.min(parseFloat(speedSlider.value) + 0.1, +speedSlider.max).toFixed(2);
      updateSliderUI();
      showToast('السرعة: ×' + parseFloat(speedSlider.value).toFixed(1));
      break;
    case 'KeyM':
      openSidebar();
      break;
    case 'Escape':
      closeSidebar();
      break;
  }
});

// ====== CONTROLS ======
function updateSliderUI() {
  const val = parseFloat(speedSlider.value);
  const pct = ((val - +speedSlider.min) / (+speedSlider.max - +speedSlider.min)) * 100;
  speedSlider.style.background = `linear-gradient(to left, rgba(200,169,110,0.8) ${pct}%, var(--track) ${pct}%)`;
  speedBadge.textContent = `×${val.toFixed(1)}`;
  scheduleUI();
}

scrollBtn.addEventListener('click', (e) => { e.stopPropagation(); isScrolling ? stopScroll() : startScroll(); });
plusBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  speedSlider.value = Math.min(parseFloat(speedSlider.value) + 0.1, +speedSlider.max).toFixed(2);
  updateSliderUI();
});
minusBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  speedSlider.value = Math.max(parseFloat(speedSlider.value) - 0.1, +speedSlider.min).toFixed(2);
  updateSliderUI();
});
speedSlider.addEventListener('click', (e) => e.stopPropagation());
speedSlider.addEventListener('input', updateSliderUI);
seekBar.addEventListener('click', (e) => e.stopPropagation());

document.body.addEventListener('click', (e) => {
  if (!scrollPanel.contains(e.target) && !sidebar.contains(e.target)) {
    scrollPanel.classList.toggle('hidden');
  }
});

window.addEventListener('resize', () => { recalcMax(); scheduleUI(); });
window.addEventListener('beforeunload', saveProgress);

// ====== INIT ======
window.addEventListener('load', () => {
  try {
    const raw = localStorage.getItem('quranProgress');
    if (raw) {
      const data = JSON.parse(raw);
      if (data.speed) { speedSlider.value = data.speed; }
      if (data.surah) currentSurah = data.surah;
    }
  } catch {}
  updateSliderUI();
  loadSurah(currentSurah);
});
</script>
